[[omissions]]
id = "legacy-html-webserver"
area = "controller"
stock_behavior = "Classic eMule exposes a legacy HTML WebServer controller surface."
rust_behavior = "The Rust client exposes the eMuleBB /api/v1 REST controller surface only."
reason = "The Rust client is a headless local eMuleBB client, not legacy WebServer parity."
