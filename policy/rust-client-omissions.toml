[[omissions]]
id = "time-based-scheduler"
area = "controller"
stock_behavior = "eMuleBB's CScheduler (Scheduler.cpp) runs time-of-day / weekday automation: scheduled actions on daily/weekday timers change the upload/download speed limits (ACTION_SETUPL / ACTION_SETDOWNL), the per-file source limit (ACTION_SOURCESL), the connection-rate limits (ACTION_CON5SEC / ACTION_CONS), and stop/resume categories (ACTION_CATSTOP / ACTION_CATRESUME), plus timed connect/disconnect."
rust_behavior = "The Rust client implements no in-process time-of-day scheduler. Every action the scheduler would automate is already a first-class /api/v1 REST operation (preferences PATCH for the speed/source/connection limits, the server/Kad connect+disconnect operations, and per-transfer/category pause+resume), so scheduling is delegated to the external controller (cron / systemd timer / the controller process) that drives the headless client."
reason = "Deliberate divergence for the headless model: time-of-day automation is an external-orchestration concern, not a client-core one. An external scheduler driving the existing REST surface is strictly more flexible than an in-process daily/weekday timer, and avoids duplicating scheduling logic (and a wall-clock dependency) inside the core. The operator's excluded-surface list records the time-based scheduler as intentionally out of scope."
compatibility = "Does not affect eD2K or Kad wire compatibility; it is a local automation convenience with no protocol surface. Every scheduled effect remains reachable on demand over the REST contract."

[[omissions]]
id = "pref-download-auto-broadband-io"
area = "preferences"
stock_behavior = "Classic eMule's downloadAutoBroadbandIo enables an adaptive disk/broadband IO tuning mode in the GUI."
rust_behavior = "The Rust client accepts, persists and echoes the downloadAutoBroadbandIo preference for REST-contract compatibility, but does not drive any adaptive IO tuning from it; the transfer runtime uses its own fixed IO/throttle model."
reason = "downloadAutoBroadbandIo is an eMule GUI adaptive-IO convenience with no clean headless mapping: the headless transfer runtime has its own IO and throttle model, so the GUI auto-IO flag is intentionally not wired."
compatibility = "Does not affect eD2K or Kad wire compatibility; the preference round-trips over the REST contract unchanged."

[[omissions]]
id = "source-supplement-scarcity-gate"
area = "ed2k"
stock_behavior = "eMule supplements a download's sources via global UDP server source search and Kad source search up to the per-file UDP source cap (CDownloadQueue, GetMaxSourcePerFileUDP = min(maxSources*3/4, 100)), i.e. it keeps launching fresh global lookups until a file already has on the order of 100 sources."
rust_behavior = "The Rust client issues the global UDP and Kad source supplements only while a file is source-scarce (existing source count <= kad_source_supplement_max_existing_sources, default 2); the always-on connected-server source reask is unaffected. A well-sourced file (>= 3 sources) does not trigger fresh global UDP / Kad source searches until it drops back to scarcity."
reason = "Deliberate be-gentle / no-ban divergence, matching the conn-rate gentleness (see conn-rate-rolling-five-second-window): a VPN'd headless client should not fan out global UDP + Kad source searches for files that already have enough sources to make progress. The connected-server reask still refreshes sources continuously; only the scatter-shot UDP/Kad supplement is gated to the scarce case, which is strictly less network-aggressive than eMule's per-file-UDP-cap model."
compatibility = "Does not affect eD2K or Kad wire compatibility; it only makes outbound source-discovery traffic equal-or-gentler than the master. A well-sourced file continues with its existing sources plus connected-server reasks instead of launching additional global lookups; a scarce file still gets the full UDP + Kad supplement."
