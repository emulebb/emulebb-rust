[[omissions]]
id = "peer-chat-messaging"
area = "ed2k"
stock_behavior = "Classic eMule supports interactive peer-to-peer text chat/messaging (OP_MESSAGE) and a chat window."
rust_behavior = "The Rust client does not send or surface peer chat/messages; it has no chat session state."
reason = "Chat is an interactive UI feature with no eMuleBB /api/v1 surface (the REST contract exposes no messaging routes), so it is outside the headless, REST-controllable scope of this client."
compatibility = "Does not affect eD2K or Kad wire compatibility; unsupported OP_MESSAGE from peers is simply not surfaced."

[[omissions]]
id = "udp-source-reask-transport"
area = "ed2k"
stock_behavior = "eMule keeps an upload-queue position warm for hours by disconnecting and periodically reasking each source over UDP (OP_REASKFILEPING/OP_REASKACK/OP_QUEUEFULL/OP_FILENOTFOUND on the client UDP socket), and answers inbound reasks from peers queued on it."
rust_behavior = "Client-to-client UDP source-reask is fully implemented but gated OFF by default behind Ed2kConfig.enable_udp_reask (default false), so the shipped default still keeps queued sources via the held-TCP fallback. When enabled, the runtime loop (crates/emulebb-ed2k/src/ed2k_client_udp/runtime.rs) shares the Kad UDP socket (peers reask the advertised ET_UDPPORT == kad_udp_port): it registers a foreign-datagram handler on the Kad recv loop's decode-failure branch, answers inbound OP_REASKFILEPING from the global upload queue + shared catalog (uploader reciprocity), detaches queued download sources onto periodic UDP reask with real per-file partstatus + complete-source counts (downloader), and drops UDP-exhausted sources back to the TCP path. The pure layer (codec, pending-reply gate, per-source state + cadence, reaction tables, client-UDP obfuscation, inbound key-try classifier) underpins it. The only remaining step is live validation before flipping the flag on."
reason = "Wire-faithful and gated, never half-spoken: the full transport is built to the master's framing/obfuscation, but stays off by default until a gentle live-wire validation (Rust<->Rust then Rust<->stock) confirms it before it is trusted on the public network."
compatibility = "Stock-compatible: with the flag off (default) everything degrades to TCP, which stock supports; with the flag on, reasks use the master's exact OP_REASKFILEPING/ACK/QUEUEFULL/FILENOTFOUND framing + client-UDP obfuscation on the shared Kad UDP port, honouring the advertised udp_version=4."
