[[omissions]]
id = "sx1-live-source-exchange"
area = "ed2k"
stock_behavior = "Legacy clients may advertise and use Source Exchange v1 live request and answer opcodes."
rust_behavior = "The Rust client does not advertise or implement live SX1 paths; source exchange support is SX2-only."
reason = "Workspace policy records SX1 live source exchange as intentionally removed deprecated behavior."
compatibility = "Stock-compatible for the supported surface because unsupported SX1 is not advertised."

[[omissions]]
id = "ipv6-ed2k-kad"
area = "ed2k-kad"
stock_behavior = "Some modern clients may have protocol-adjacent IPv6 connectivity support."
rust_behavior = "The Rust client is IPv4-only for eD2K, Kad, peer transfer, NAT, and bootstrap behavior."
reason = "Rust client policy chooses IPv4-only scope for this line."
compatibility = "Stock-compatible for IPv4 peers and servers; IPv6 is not advertised as supported."

[[omissions]]
id = "legacy-html-webserver"
area = "controller"
stock_behavior = "Classic eMule exposes a legacy HTML WebServer controller surface."
rust_behavior = "The Rust client exposes the eMuleBB /api/v1 REST controller surface only."
reason = "The Rust client is a headless local eMuleBB client, not legacy WebServer parity."
compatibility = "Does not affect eD2K or Kad wire compatibility."

[[omissions]]
id = "peer-chat-messaging"
area = "ed2k"
stock_behavior = "Classic eMule supports interactive peer-to-peer text chat/messaging (OP_MESSAGE) and a chat window."
rust_behavior = "The Rust client does not send or surface peer chat/messages; it has no chat session state."
reason = "Chat is an interactive UI feature with no eMuleBB /api/v1 surface (the REST contract exposes no messaging routes), so it is outside the headless, REST-controllable scope of this client."
compatibility = "Does not affect eD2K or Kad wire compatibility; unsupported OP_MESSAGE from peers is simply not surfaced."

[[omissions]]
id = "ed2k-reask-callback-udp"
area = "ed2k"
stock_behavior = "When a downloader cannot reach a LowID source directly over client UDP, eMule sends OP_REASKCALLBACKUDP to the source's Kad buddy, which (as the buddy) verifies the leading buddy-id against its served buddy and relays the request to that buddy over TCP as OP_REASKCALLBACKTCP (ClientUDPSocket.cpp / DownloadClient.cpp)."
rust_behavior = "The Rust client has a complete, unit-tested OP_REASKCALLBACKUDP wire codec (encode/decode in ed2k_client_udp/codec.rs) but does not act on it: the inbound reask path returns Ignored for the callback relay, and there is no outbound OP_REASKCALLBACKUDP send. The OP_REASKCALLBACKTCP frame is decoded/logged on the download session only."
reason = "OP_REASKCALLBACKUDP is part of the client-UDP source-reask transport, which is gated off by default and not yet live-validated (docs/design/udp-source-reask.md Phase-2 scaffold). Both halves depend on the deferred reask transport: the buddy-relay half would need the BuddySocketRegistry threaded into the off-by-default reask runtime, and the downloader half is part of the unimplemented outbound reask transport. Wiring only one half into an off-by-default loop without live validation would be half-wired behavior; it is deliberately deferred as a pure documented codec scaffold until the reask transport is enabled and validated."
compatibility = "Does not affect eD2K or Kad wire compatibility: the Rust client never advertises or relies on UDP buddy reask callbacks; sources remain reachable over the normal TCP source-acquisition path, so an unrelayed reask callback simply falls back to TCP exactly as when a buddy is unavailable."

[[omissions]]
id = "ed2k-preview"
area = "ed2k"
stock_behavior = "Classic eMule can request a media preview from a peer (OP_REQUESTPREVIEW) and answer one (OP_PREVIEWANSWER) by extracting and sending a few decoded video/image frames, viewed in the UI."
rust_behavior = "The Rust client decodes and logs inbound OP_REQUESTPREVIEW / OP_PREVIEWANSWER for diagnostics but never generates a preview answer and never requests previews; there is no frame-extraction or preview surface."
reason = "Preview is a rarely-used interactive media feature: answering it needs a heavy media frame-extraction dependency and opens an untrusted-media decode surface, with no eMuleBB /api/v1 route to drive or expose it. Deliberately omitted (operator decision 2026-06-15); it is not advertised as required."
compatibility = "Does not affect eD2K or Kad wire compatibility; an unanswered preview request simply yields no preview, exactly as a stock peer that has the feature disabled."
