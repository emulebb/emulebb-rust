area = "kad"
stock_behavior = "eMule attaches media-metadata tags to each Kad keyword-publish file entry when GetMetaDataVer() > 0 (PreparePacketForTags, Search.cpp:1499-1547): FT_MEDIA_ARTIST / FT_MEDIA_ALBUM / FT_MEDIA_TITLE (string), FT_MEDIA_LENGTH / FT_MEDIA_BITRATE (uint32), FT_MEDIA_CODEC (string), skipping empty strings / zero ints / filename-redundant strings. A searcher can then filter Kad keyword-search results by bitrate / length / codec / artist / album / title."
rust_behavior = "The Rust client attaches only FILENAME, FILESIZE, SOURCES, FILETYPE (+AICH when applicable) to a keyword-publish entry and no media-metadata tags. This is systemic: the Rust client has no media-metadata extraction pipeline and its transfer/known-file model (MetadataTransferPublishEntry, the known_files schema) carries no bitrate/codec/length/artist/album/title fields. A Rust-published file is fully findable by keyword, file type, name, and size, but NOT by a media-attribute-filtered Kad search."
reason = "Media-metadata extraction is a heavy pipeline (a media demuxer/parser dependency to read container/codec/bitrate/length/tags) with no headless mapping and no eMuleBB /api/v1 surface to drive or expose it. It is consistent with the already-deferred interactive media features (ed2k-preview, ed2k-partial-file-preview). Only the OPTIONAL media-filter dimension of a Kad keyword search is affected; the file remains findable by keyword/type/name/size, which is the dominant search path."
compatibility = "Does not break eD2K or Kad wire compatibility: the keyword entry we publish is a valid subset of the oracle's tag set (all attached tags are byte-exact and correctly gated), and a Kad index node stores it without issue. The only difference is that a searcher applying a media-attribute filter (bitrate/length/codec/artist/album/title) will not match Rust-published entries, exactly as an eMule client that has metadata extraction disabled (GetMetaDataVer()==0) would also publish no media tags."
review_disposition = "defer"
review_disposition_note = "RUST-PAR-022 round-22 Kad-publish-content review (2026-07-09): CONFIRMED absent (keyword entry lib.rs:6875-6882 emits no media tags; no extraction pipeline / schema columns). DEFER pending an explicit decision to build a media-metadata extractor — a large scope item consistent with the deferred ed2k-preview media features. Findability impact limited to the optional media-filter search dimension; keyword/type/name/size search unaffected. Revisit if media-filtered search parity becomes a requirement."
