[[omissions]]
id = "ed2k-reask-callback-udp-buddy-id-supply-for-low-id-sources"
area = "ed2k"
stock_behavior = "A downloader that cannot reach a source over client UDP, and that knows the source's Kad buddy (GetBuddyIP/GetBuddyPort/HasValidBuddyID), originates an OP_REASKCALLBACKUDP to that buddy so the reask is relayed to the firewalled source (DownloadClient.cpp:1840-1862 UDPReaskForDownload LowID branch). For a Kad-found firewalled source the buddy id + buddy IP/port arrive together in the SEARCH_RES (FT_BUDDYHASH/FT_SERVERIP/FT_SERVERPORT, Kademlia Search.cpp), and SetBuddyID is set only from that Kad path (DownloadQueue.cpp:2793) -- never from the eD2k hello, which carries only the buddy endpoint (CT_EMULE_BUDDYIP/CT_EMULE_BUDDYUDP)."
rust_behavior = "The Rust client now implements the full OP_REASKCALLBACKUDP origination *mechanism* end-to-end: it decodes a peer's buddy endpoint from its hello (ed2k_tcp/hello + hello_buddy DecodedHelloBuddy), stores the firewalled-LowID flag + buddy endpoint + buddy id per reask source (ReaskSource.with_buddy / buddy_reask_target, gated exactly like HasLowID && GetBuddyIP && GetBuddyPort && HasValidBuddyID), and the reask tick originates a correctly-framed plaintext OP_REASKCALLBACKUDP ([buddy_id][file_hash][reask tail]) targeted at the source's buddy endpoint instead of a direct ping (ed2k_client_udp/buddy_relay::build_downloader_callback_origination + source_set::due_datagrams), all unit-tested. Both buddy-relay legs (as the source's buddy, and as the firewalled source answering) were already complete. The single remaining gap is the *buddy-id supply for LowID sources*: the buddy id (and the LowID source's buddy IP/port) is not yet parsed from the Kad SEARCH_RES (SourceResult/Ed2kFoundSource carry no FT_SOURCETYPE/FT_BUDDYHASH/FT_SERVERIP/FT_SERVERPORT), and LowID sources do not enter the per-session reask detach path (they are routed to the server/Kad connect-back callback, not a direct download session). So origination fires whenever a buddy id is supplied, but the Rust source pipeline never yet supplies one, leaving the leg dormant for LowID sources."
reason = "Supplying the buddy id requires two cross-subsystem additions on the independent-per-transfer architecture: (1) parsing FT_SOURCETYPE/FT_BUDDYHASH/FT_SERVERIP/FT_SERVERPORT from the Kad source SEARCH_RES into SourceResult and threading buddy_id + buddy endpoint through Ed2kFoundSource into the download path, and (2) having the LowID-source callback/queue path detach onto the UDP reask loop carrying that buddy info (today only HighID, directly-dialable sources reach try_detach_queued_source_for_reask; LowID sources go through the connect-back callback). Both are new features touching the Kad source decode, the source model, and the callback/download integration -- the per-source buddy-discovery + state plumbing the original omission cited -- and are out of scope under the RC2 soft freeze. Narrowed (2026-06-16) to just the buddy-id supply: the decode-store-originate mechanism + both relay legs are now fully implemented."
compatibility = "Does not affect eD2K or Kad wire compatibility: the Rust client fully serves the buddy-relay and source-answer roles for peers that use this path, and originates a buddy-relayed reask the moment a source's buddy id is known. With no buddy id supplied for a LowID source it falls back to the normal connect-back callback / TCP source-acquisition path, exactly as when no buddy is available."

[[omissions]]
id = "ed2k-preview"
area = "ed2k"
stock_behavior = "Classic eMule can request a media preview from a peer (OP_REQUESTPREVIEW) and answer one (OP_PREVIEWANSWER) by extracting and sending a few decoded video/image frames, viewed in the UI."
rust_behavior = "The Rust client decodes and logs inbound OP_REQUESTPREVIEW / OP_PREVIEWANSWER for diagnostics but never generates a preview answer and never requests previews; there is no frame-extraction or preview surface."
reason = "Preview is a rarely-used interactive media feature: answering it needs a heavy media frame-extraction dependency and opens an untrusted-media decode surface, with no eMuleBB /api/v1 route to drive or expose it. Deliberately omitted (operator decision 2026-06-15); it is not advertised as required."
compatibility = "Does not affect eD2K or Kad wire compatibility; an unanswered preview request simply yields no preview, exactly as a stock peer that has the feature disabled."
