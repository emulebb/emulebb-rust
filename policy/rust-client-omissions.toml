[[omissions]]
id = "sx1-live-source-exchange"
area = "ed2k"
stock_behavior = "Legacy clients may advertise and use Source Exchange v1 live request and answer opcodes."
rust_behavior = "The Rust client does not advertise or implement live SX1 paths; source exchange support is SX2-only."
reason = "Workspace policy records SX1 live source exchange as intentionally removed deprecated behavior."
