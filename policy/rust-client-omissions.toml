[[omissions]]
id = "peer-chat-messaging"
area = "ed2k"
stock_behavior = "Classic eMule supports interactive peer-to-peer text chat/messaging (OP_MESSAGE) and a chat window."
rust_behavior = "The Rust client does not send or surface peer chat/messages; it has no chat session state."
reason = "Chat is an interactive UI feature with no eMuleBB /api/v1 surface (the REST contract exposes no messaging routes), so it is outside the headless, REST-controllable scope of this client."
compatibility = "Does not affect eD2K or Kad wire compatibility; unsupported OP_MESSAGE from peers is simply not surfaced."

[[omissions]]
id = "ed2k-preview"
area = "ed2k"
stock_behavior = "Classic eMule can request a media preview from a peer (OP_REQUESTPREVIEW) and answer one (OP_PREVIEWANSWER) by extracting and sending a few decoded video/image frames, viewed in the UI."
rust_behavior = "The Rust client decodes and logs inbound OP_REQUESTPREVIEW / OP_PREVIEWANSWER for diagnostics but never generates a preview answer and never requests previews; there is no frame-extraction or preview surface."
reason = "Preview is a rarely-used interactive media feature: answering it needs a heavy media frame-extraction dependency and opens an untrusted-media decode surface, with no eMuleBB /api/v1 route to drive or expose it. Deliberately omitted (operator decision 2026-06-15); it is not advertised as required."
compatibility = "Does not affect eD2K or Kad wire compatibility; an unanswered preview request simply yields no preview, exactly as a stock peer that has the feature disabled."

[[omissions]]
id = "pref-auto-connect"
area = "preferences"
stock_behavior = "Classic eMule auto-connects to the eD2K server / Kad on startup when 'Connect on startup' (autoConnect) is enabled."
rust_behavior = "The Rust client accepts, persists and echoes the autoConnect preference for REST-contract compatibility, but does not drive any startup auto-connect from it; network connect is initiated explicitly via the REST control plane."
reason = "Auto-connect is an eMule GUI startup behavior with no clean headless mapping: the headless client is driven by an external controller that decides when to connect, so a startup auto-connect flag is intentionally not wired."
compatibility = "Does not affect eD2K or Kad wire compatibility; the preference round-trips over the REST contract unchanged."

