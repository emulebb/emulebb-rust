[[omissions]]
id = "udp-source-reask-transport"
area = "ed2k"
stock_behavior = "eMule keeps an upload-queue position warm for hours by disconnecting and periodically reasking each source over UDP (OP_REASKFILEPING/OP_REASKACK/OP_QUEUEFULL/OP_FILENOTFOUND on the client UDP socket), and answers inbound reasks from peers queued on it."
rust_behavior = "Client-to-client UDP source-reask is fully implemented but gated OFF by default behind Ed2kConfig.enable_udp_reask (default false), so the shipped default still keeps queued sources via the held-TCP fallback. When enabled, the runtime loop (crates/emulebb-ed2k/src/ed2k_client_udp/runtime.rs) shares the Kad UDP socket (peers reask the advertised ET_UDPPORT == kad_udp_port): it registers a foreign-datagram handler on the Kad recv loop's decode-failure branch, answers inbound OP_REASKFILEPING from the global upload queue + shared catalog (uploader reciprocity), detaches queued download sources onto periodic UDP reask with real per-file partstatus + complete-source counts (downloader), and drops UDP-exhausted sources back to the TCP path. The pure layer (codec, pending-reply gate, per-source state + cadence, reaction tables, client-UDP obfuscation, inbound key-try classifier) underpins it. The only remaining step is live validation before flipping the flag on."
reason = "Wire-faithful and gated, never half-spoken: the full transport is built to the master's framing/obfuscation, but stays off by default until a gentle live-wire validation (Rust<->Rust then Rust<->stock) confirms it before it is trusted on the public network."
compatibility = "Stock-compatible: with the flag off (default) everything degrades to TCP, which stock supports; with the flag on, reasks use the master's exact OP_REASKFILEPING/ACK/QUEUEFULL/FILENOTFOUND framing + client-UDP obfuscation on the shared Kad UDP port, honouring the advertised udp_version=4."

[[omissions]]
id = "kad-buddy-callback-relay"
area = "ed2k-kad"
stock_behavior = "When eMule serves as a Kad buddy for a firewalled LowID client, it keeps a persistent buddy TCP connection to that client (ClientList RequestBuddy/IncomingBuddy + buddy keepalive). On receiving a KADEMLIA_CALLBACK_REQ over UDP it relays an OP_CALLBACK to the buddied client over that held TCP socket (Process_KADEMLIA_CALLBACK_REQ -> pBuddy->socket->SendPacket), and a firewalled node similarly holds the TCP connection to ITS buddy so callbacks can be relayed back to it."
rust_behavior = "The Kad buddy subsystem is wired and driven: a firewalled (LowID, verified) Rust node searches Kad near its derived buddy target (ownId XOR all-ones) and sends KADEMLIA_FINDBUDDY_REQ; an inbound FINDBUDDY_REQ is answered with FINDBUDDY_RES when we are reachable and not already a buddy; a verified FINDBUDDY_RES is recorded as our acquired buddy; an inbound CALLBACK_REQ is matched to the buddied client. The one leg NOT implemented is the OP_CALLBACK *relay over a persistent buddy TCP connection*: the Rust eD2k client-TCP layer is connection-per-operation and holds no persistent peer-socket registry, so we cannot keep a buddy socket open to relay onto. The receive side of the firewalled callback IS completed: if a buddy relays an OP_CALLBACK to us over an inbound TCP session, we TCP-connect out to the requesting peer (connect_callback_peer)."
reason = "The relay leg requires a persistent peer-session/socket manager that does not exist in this codebase; building one is a separate, large subsystem well beyond the buddy/callback slice and would touch the frozen download/listener session machinery. Everything that is wire-faithful on the existing architecture (the UDP FINDBUDDY/CALLBACK protocol, buddy acquisition, and the outbound callback completion) is implemented and driven rather than scaffolded; the held-TCP relay is explicitly deferred, not silently stubbed."
compatibility = "Wire-compatible for the implemented surface: a Rust node is a correct FINDBUDDY responder and a correct buddy-seeking firewalled node, and completes firewalled callbacks it receives. The gap is that a Rust buddy cannot relay a third party's CALLBACK_REQ onward, so a Rust node is a less complete *relay* for others; its own reachability as a LowID Kad source via the callback completion path is unaffected."
