[[omissions]]
id = "sx1-live-source-exchange"
area = "ed2k"
stock_behavior = "Legacy clients may advertise and use Source Exchange v1 live request (OP_REQUESTSOURCES) and answer (OP_ANSWERSOURCES) opcodes."
rust_behavior = "The Rust client is SX2-only on every live source-exchange leg: it never sends OP_REQUESTSOURCES (download startup + multipacket request request only SX2 OP_REQUESTSOURCES2, with no SX1 fallback even for an SX1-only peer), never answers an inbound OP_REQUESTSOURCES with OP_ANSWERSOURCES (the standalone + both multipacket serve paths decode-and-ignore SX1), and does not ingest an inbound OP_ANSWERSOURCES (it is decoded for the diagnostic dump only and its sources are dropped). SX2 (OP_REQUESTSOURCES2 / OP_ANSWERSOURCES2) request, serve, and ingest stay fully active. The SX1 wire encoders/decoders remain only for codec round-trip tests."
reason = "Workspace policy records SX1 live source exchange as intentionally removed deprecated behavior; eMuleBB is SX2-only (operator decision REF-002)."
compatibility = "Stock-compatible for the supported surface because unsupported SX1 is not advertised or acted on; an SX1-only peer simply yields no exchanged sources, and an unsolicited SX1 answer is ignored."

[[omissions]]
id = "conn-rate-rolling-five-second-window"
area = "ed2k"
stock_behavior = "eMule's connection-rate limiter (CListenSocket::TooManySockets, ListenSocket.cpp:2652-2654) compares a per-Process-tick accumulator m_OpenSocketsInterval against GetMaxConperFive(), and the accumulator is reset by CListenSocket::Process roughly once per second so the 'per five seconds' budget is enforced as a series of short per-tick batches rather than a true sliding window."
rust_behavior = "The Rust shared download coordinator instead enforces the new-connection rate as a conservative rolling 5-second sliding window (download_coordinator.rs recent_connection_grants: a grant is counted for a full DEFAULT_CONNECTION_WINDOW=5s and only then ages out), so at most GetMaxConperFive() new outgoing connections are admitted in ANY 5s span. The concurrent cap (GetMaxConnections), the per-5s rate value, and the half-open cap (GetMaxHalfConnections, default 50) are all matched; only the rate-window MODEL is the conservative sliding variant rather than eMule's per-tick reset."
reason = "Deliberate divergence (operator decision option B, connection-management safe subset): a VPN'd headless client must be gentle and avoid connection-rate bans, and a true rolling window can never burst above the per-5s budget the way eMule's per-tick batches can. The conservative window is strictly less aggressive than the master."
compatibility = "Does not affect eD2K or Kad wire compatibility; it only makes outbound connection pacing equal-or-gentler than the master. A peer/server sees the same protocol, just never a per-tick burst."

[[omissions]]
id = "conn-rate-spike-modifier"
area = "ed2k"
stock_behavior = "eMule scales the per-5s new-connection budget by GetMaxConperFiveModifier() (the 'spike' modifier in CListenSocket::TooManySockets, ListenSocket.cpp:2653), which transiently RAISES the allowed new-connection rate above GetMaxConperFive() under certain conditions."
rust_behavior = "The Rust coordinator does not implement the spike modifier: the per-window new-connection budget is a flat max_connections_per_window (GetMaxConperFive) with no upward spike scaling."
reason = "Deliberate divergence (operator decision option B): the spike modifier is only meaningful under eMule's aggressive per-Process-tick rate model (which the Rust client intentionally does not adopt, see conn-rate-rolling-five-second-window). A burst-raising modifier is the opposite of the be-gentle/no-ban posture for a VPN'd headless client, so it is intentionally omitted."
compatibility = "Does not affect eD2K or Kad wire compatibility; it only keeps the outbound connection rate at or below the flat per-5s budget (never spiking above it), i.e. equal-or-gentler than the master."

[[omissions]]
id = "upload-throttle-focus-slot-distribution"
area = "ed2k"
stock_behavior = "eMule's CUploadBandwidthThrottler distributes the per-cycle upload byte budget by walking an ORDERED slot list and letting the front (focus) slots consume the bulk at full speed, giving later slots only the leftover / a minimum trickle. This concentrates bandwidth on a few slots for TCP efficiency and faster per-download completion."
rust_behavior = "The Rust client distributes upload bandwidth with a shared FIFO token-bucket (reserve_upload_payload): each independent per-transfer upload task reserves its turn in arrival order, so the budget is shared roughly equally across all active slots rather than front-loaded onto a focus slot. The slot COUNT model (base + elastic broadband slots) and the upload scoring/ordering of the queue are at parity; only the in-flight bandwidth DISTRIBUTION among already-open slots differs."
reason = "Deliberate architectural choice (operator decision 2026-06-17): the FIFO token-bucket fits the task-per-transfer async model (no central ordered send authority), is simpler and robust, and the efficiency difference is marginal except with many simultaneously-saturated upload slots. Per the guiding principle 'prefer rust's efficiency when the result is the same or better', the equal-share result is acceptable; focus-slot would only help under heavy multi-slot saturation."
compatibility = "Does not affect eD2K or Kad wire compatibility; a downloading peer sees the same protocol, only a more even bandwidth share under heavy concurrent upload load."

[[omissions]]
id = "ipv6-ed2k-kad"
area = "ed2k-kad"
stock_behavior = "Some modern clients may have protocol-adjacent IPv6 connectivity support."
rust_behavior = "The Rust client is IPv4-only for eD2K, Kad, peer transfer, NAT, and bootstrap behavior."
reason = "Rust client policy chooses IPv4-only scope for this line."
