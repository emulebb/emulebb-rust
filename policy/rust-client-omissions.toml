[[omissions]]
id = "sx1-live-source-exchange"
area = "ed2k"
stock_behavior = "Legacy clients may advertise and use Source Exchange v1 live request (OP_REQUESTSOURCES) and answer (OP_ANSWERSOURCES) opcodes."
rust_behavior = "The Rust client is SX2-only on every live source-exchange leg: it never sends OP_REQUESTSOURCES (download startup + multipacket request request only SX2 OP_REQUESTSOURCES2, with no SX1 fallback even for an SX1-only peer), never answers an inbound OP_REQUESTSOURCES with OP_ANSWERSOURCES (the standalone + both multipacket serve paths decode-and-ignore SX1), and does not ingest an inbound OP_ANSWERSOURCES (it is decoded for the diagnostic dump only and its sources are dropped). SX2 (OP_REQUESTSOURCES2 / OP_ANSWERSOURCES2) request, serve, and ingest stay fully active. The SX1 wire encoders/decoders remain only for codec round-trip tests."
reason = "Workspace policy records SX1 live source exchange as intentionally removed deprecated behavior; eMuleBB is SX2-only (operator decision REF-002)."
compatibility = "Stock-compatible for the supported surface because unsupported SX1 is not advertised or acted on; an SX1-only peer simply yields no exchanged sources, and an unsolicited SX1 answer is ignored."

[[omissions]]
id = "conn-rate-rolling-five-second-window"
area = "ed2k"
stock_behavior = "eMule's connection-rate limiter (CListenSocket::TooManySockets, ListenSocket.cpp:2652-2654) compares a per-Process-tick accumulator m_OpenSocketsInterval against GetMaxConperFive(), and the accumulator is reset by CListenSocket::Process roughly once per second so the 'per five seconds' budget is enforced as a series of short per-tick batches rather than a true sliding window."
rust_behavior = "The Rust shared download coordinator instead enforces the new-connection rate as a conservative rolling 5-second sliding window (download_coordinator.rs recent_connection_grants: a grant is counted for a full DEFAULT_CONNECTION_WINDOW=5s and only then ages out), so at most GetMaxConperFive() new outgoing connections are admitted in ANY 5s span. The concurrent cap (GetMaxConnections), the per-5s rate value, and the half-open cap (GetMaxHalfConnections, default 50) are all matched; only the rate-window MODEL is the conservative sliding variant rather than eMule's per-tick reset."
reason = "Deliberate divergence (operator decision option B, connection-management safe subset): a VPN'd headless client must be gentle and avoid connection-rate bans, and a true rolling window can never burst above the per-5s budget the way eMule's per-tick batches can. The conservative window is strictly less aggressive than the master."
compatibility = "Does not affect eD2K or Kad wire compatibility; it only makes outbound connection pacing equal-or-gentler than the master. A peer/server sees the same protocol, just never a per-tick burst."
review_disposition = "defer"
review_disposition_note = "RUST-PAR-019 round-19 re-audit (2026-07-08): CONFIRMED accurate - rust holds grants a full 5s then ages out (download_coordinator.rs), strictly gentler than stock's per-tick reset (ListenSocket.cpp:2530/2649). No protocol surface. DEFER."

[[omissions]]
id = "conn-rate-spike-modifier"
area = "ed2k"
stock_behavior = "eMule scales the per-5s new-connection budget by GetMaxConperFiveModifier() (CListenSocket::TooManySockets / GetMaxConperFiveModifier, ListenSocket.cpp:2653,2722-2728). The modifier is a SUPPRESSOR, not a raiser: it returns a multiplier in [0,1) computed from the recent open-socket spike ((SpikeSize > SpikeTolerance) ? 0 : 1 - SpikeSize/SpikeTolerance), so during a connection spike stock throttles its effective per-5s budget BELOW GetMaxConperFive() (down to 0), then relaxes back to the flat budget as the spike subsides."
rust_behavior = "IMPLEMENTED (RUST-PAR-026): the Rust download coordinator samples its live connection count once per second, maintains MFC's capped moving average, and applies GetMaxConperFiveModifier's [0,1) spike suppressor to the five-second admission window with the same strict-greater-than boundary."
reason = "RUST-PAR-026 closed the only connection-pacing axis where Rust could be more aggressive than MFC during a sudden socket burst."
compatibility = "No packet shape changed; connection admission pacing now matches MFC's adaptive suppressor."
review_disposition = "fix"
review_disposition_note = "RUST-PAR-026 (2026-07-10): IMPLEMENTED in download_coordinator.rs with focused burst and zero-modifier boundary tests. No longer an omission; retained as audit history."

[[omissions]]
id = "upload-throttle-focus-slot-distribution"
area = "ed2k"
stock_behavior = "STOCK eMule's CUploadBandwidthThrottler front-loads: it walks an ordered slot list letting the front (focus) slots consume the bulk at full speed. NOTE: this eMuleBB FORK does NOT do that - its throttler was rewritten to EQUAL sharing across slots (UploadBandwidthThrottler.cpp:547 '// Equal bandwidth for all slots', feeding from a rotating rememberedSlotCounter up to maxSlot = allowedDataRate/targetDataRate, with the surplus pass using PopRotatingSlotIndex :580-581 'so early fast sockets cannot permanently monopolize surplus capacity'). So the front-loading described here is stock behavior the reference fork abandoned; the only fork-specific pacing detail is the per-slot send granularity (doubleSendSize 2600B at >=6KB/s, 536B below 6KB/s) fed on a ~1ms loop."
rust_behavior = "The Rust client distributes upload bandwidth with a shared FIFO token-bucket (reserve_upload_payload): each independent per-transfer upload task reserves its turn in arrival order, so the budget is shared roughly equally across all active slots. This MATCHES the fork's equal-share model on the fairness axis. The only residual is send granularity: rust reserves+sends per wire packet (<=10240B) then sleeps bytes/limit, vs the fork's finer 2600B/536B chunks - coarser bursts at low upload caps but identical average per-peer rate and no per-download completion penalty."
reason = "Deliberate architectural choice (operator decision 2026-06-17), and - per the round-20 re-derivation - rust already matches the reference fork's equal-share throttler; only the send-granularity/burst-shape at low caps differs, with identical average throughput. The FIFO token-bucket fits the task-per-transfer async model (no central ordered send authority). Per 'prefer rust's efficiency when the result is the same or better', equal-share is the correct target here (the fork itself abandoned focus-slot front-loading)."
compatibility = "Does not affect eD2K or Kad wire compatibility; a downloading peer sees the same protocol. Correction to the earlier claim: rust is NOT 'more even than the fork' - the fork is already equal-share, so rust matches it; the only difference is coarser low-cap burst granularity with the same average rate."
review_disposition = "defer"
review_disposition_note = "RUST-PAR-020 round-20 upload-throttler re-derivation (2026-07-08): the registry stock_behavior (and the round-19 note) restated the WRONG premise - the reference fork's throttler is EQUAL-share (UploadBandwidthThrottler.cpp:547,580), not focus-slot front-loading (that is stock eMule, abandoned by this fork). Text corrected. rust's FIFO token bucket already matches the fork's fairness model; the only residual is low-cap send granularity (10240B vs 2600B/536B chunks), same average rate, no completion penalty. DEFER holds - rust is at the fork's fairness parity; the granularity nicety is optional polish, not a gap."

