rationale = "frozen legacy REST route/controller aggregation; split routes, request models, and response mapping as touched. Cap bumped for FEAT-014 contract alignment: paged search responses unified on items+total/offset/limit (search/start returns an empty first page) and URL-import failures returned as EMULE_ERROR instead of in-band {ok:false}. Also bumped for the dedicated GET /transfers/{hash}/details handler returning the master {transfer,parts,sources} envelope. Bumped again to report real Kad indexedSources/indexedKeywords (kad_response reads NetworkStatus) + real stats throughput (downloadSpeedKiBps aggregate and sessionDownloadedBytes/sessionUploadedBytes from TransferThroughputStats; optional total* fields omitted, matching eMuleBB), with kad_response + stats_response unit tests. Bumped again (+78) to gate the Upload scoreBreakdown on the includeScoreBreakdown query like master: a without_score_breakdown helper strips the breakdown for the /uploads list (never), the /upload-queue list (unless includeScoreBreakdown=true), and the dashboard, while single-client lookups keep it (master always-true path); includes a focused unit test that the helper drops scoreBreakdown from the serialized Upload. Cap RATCHETED DOWN (4410 -> 3977) by the maintainability restructuring (file-size freeze lifted 2026-06-15): the pure REST response/view builders (lifecycle/app/stats/status/network/kad/server/search/shared-file JSON builders + bulk-result mappers) were moved verbatim into the new responses module (re-exported into lib.rs), together with their kad_response/stats_response unit tests; behavior-preserving, same test counts. Ratcheted down again (3977 -> 3745) by moving the shared REST envelope/pagination/parsing helpers (api_ok/api_collection/api_collection_page/api_bulk_operation/api_meta, api_error/api_error_with_details/out_of_range_response, the PAGE_* bounds + resolve_limit/resolve_page_bounds/snapshot_limit/bounded, search_results_page, and the JSON-body/query parse helpers) into the new envelope module within the 600-line budget; behavior-preserving, same test counts. Ratcheted down again (3539 -> 3510) by starting the handlers/ tree: the log handlers (logs + clear_logs) moved into handlers/logs.rs, re-exported via handlers/mod.rs so the router wiring stays unchanged; behavior-preserving, same test counts. Ratcheted down again (3510 -> 3428) by moving the Kademlia handlers (kad/kad_start/kad_stop/kad_import_nodes_url/kad_bootstrap/kad_recheck_firewall) into handlers/kad.rs, plus a handlers::prelude that glob-re-exports the shared dto/envelope/responses helpers + RestState; behavior-preserving, same test counts. Ratcheted down again (3428 -> 3203) by moving the upload + upload-queue handlers (uploads/upload/upload_queue/upload_queue_client/upload_by_client_id + the per-client remove/release-slot/add-friend/remove-friend/ban/unban operations) and the without_score_breakdown helper into handlers/uploads.rs, with its unit test; behavior-preserving, same test counts. Ratcheted down again (3203 -> 3065) by moving the app/diagnostics/preferences/dashboard handlers (app/shutdown_app/capture_diagnostic_dump/trigger_diagnostic_crash_test/preferences/update_preferences/status/stats/snapshot) into handlers/app.rs; behavior-preserving, same test counts. Ratcheted down again (3065 -> 2970) by moving the category CRUD handlers into handlers/categories.rs and the friend CRUD handlers into handlers/friends.rs; behavior-preserving, same test counts. Ratcheted down again (3745 -> 3539) by moving the REST request/response DTO structs (BulkOperationResult, SearchResultDownloadResult, SharedFile*/Ed2kLinkResult, the *Query parsers + PageQuery/SnapshotQuery/ConfirmQuery, SearchResultsPage/Query, and the Logs/Shutdown/Diagnostic/ClearCompleted/UrlImport/KadBootstrap request bodies plus the TransfersQuery/UploadQueueQuery::page projections) into the new dto module within the 600-line budget; their fields are now pub(crate) so the handler + builder