path = "crates/emulebb-core/src/rest_model.rs"
hard_limit_lines = 1200
rationale = "REST-facing DTO request/response structs (AppInfo, Status, NetworkStatus, Transfer, TransferSource, TransferPart, TransferDetails, Upload, *Metrics, Preferences, Category, Server*, Search*, Ed2kNetworkConfig, VpnGuard*, ...) extracted verbatim from emulebb-core lib.rs during the maintainability restructuring. Pure serde data definitions with no behavior beyond (de)serialization plus the three serde-attribute helpers (default_search_method, deserialize_nullable_string_field, deserialize_nullable_u32_field); kept as one cohesive contract-surface module. Slightly over the 600 budget because it is a single coherent DTO family; splitting it would scatter the wire contract across files for no maintainability gain. Bumped (+4, 725 -> 729) for the kad_routing_maintenance_enabled gate field on Ed2kNetworkConfig (drives the periodic routing-table maintenance loop). Bumped again (+7, 729 -> 736) for the round-7b FIX 4 (CIPFilter::Reload) ip_filter_path (Option<PathBuf>) + ip_filter_level (u32) fields on Ed2kNetworkConfig, retained so EmulebbCore::reload_ip_filter can re-read the configured ipfilter.dat into the shared IpFilter backing on demand. Bumped again (+4, 736 -> 740) for the B1 finished-file delivery Transfer.delivered_path field (Option<String>, the operator-facing path a completed payload was materialized to by its canonical name; None until delivered). Bumped again (740 -> 746) for the RUST-CI-002 shared-hashing status fields added to the DTO family; still one cohesive contract-surface module."

[[structure.large_file_allowlist]]
path = "crates/emulebb-ed2k/src/ed2k_tcp/dump.rs"
hard_limit_lines = 633
rationale = "Single cohesive ed2k_packet_v1 packet-diagnostics dump unit, gated behind the packet-diagnostics Cargo feature (the equivalent of eMuleBB's EMULEBB_ENABLE_PACKET_DIAGNOSTICS #ifdef): the record struct, the per-opcode field extractors, the obfuscation/transport annotations, and the JSONL writer all belong to one diagnostic record shape and are dead-code-eliminated in release builds. Splitting the extractors from the record they populate would scatter one wire-dump format across files for no maintainability gain. Allowlisted at the current size (over the 600 default budget); the dump is diagnostic-only and carries zero release cost."

