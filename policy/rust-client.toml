stener from the live server/Kad firewall state, and begin_session rejects a we-connected + we-firewalled + non-Kad + not-downloading + not-friend + different-server candidate once waiting > 50. The pure decision (reject_firewalled_callback + FirewalledCallbackAdmission) lives in upload_queue/admission.rs within budget. Bumped again (+15) for the LowID upload-score divisor (master inputs.uLowIdDivisor, default 2): a LowID waiter's combined waiting score is halved below the friend-slot fast path (which already excludes LowID), deprioritising unreachable peers. Bumped again (+43) for C6, closing the remaining UploadClient.cpp GetScoreBreakdown shaping: Ed2kUploadPeerIdentity gains the modifier inputs (ident_bad_guy = IS_IDBADGUY, gpl_evildoer = m_bGPLEvildoer, banned = IsBanned(), emule_version + is_emule_client for the old-client predicate), and the per-session UploadScoreModifiers + the full master score path (banned/IDBADGUY/GPLEvildoer -> 0, additive low-ratio bonus, LowID divisor, then the x0.5 old-client penalty, in master order) live in the new upload_queue/score.rs module within the 600-line budget; the queue file only carries the new identity fields, the per-session score_modifiers capture, the OLD_CLIENT_PENALTY constants, the LOW_RATIO_BONUS_DISABLED sentinel, and a #[cfg(test)] test_support_peer helper. The master x0.5 old-client penalty matches BuildUploadScoreBreakdown's effective score (fWorkingScore *= 0.5 once); the duplicated 0.5 on fBaseScore is a display-only field, not the ranking score. The sysvalue+LowID+!connected zeroing remains a no-op here since an inbound queued uploader always has a live TCP socket."

