e held buddy session now answers OP_BUDDYPONG at most once every 3 minutes (oracle AllowIncomingBuddyPingPong/MIN2MS(3); last_buddy_pingpong_at on InboundBuddyHold + the pure allow_buddy_pingpong_at gate and its unit test). Bumped again (+9) to drive the Kad TCP firewall recheck open signal: the OP_KAD_FWTCPCHECK_ACK arm now records a TCP-open observation into KadFirewallState::record_tcp_open_ack, but only from an IP we actually probed (oracle ListenSocket.cpp IsKadFirewallCheckIP -> IncFirewalled). Bumped again (+12) for B2 secure-ident verification: the OP_SIGNATURE arm now RSA-verifies the inbound signature (verify_peer_secure_ident_signature, supplying our external IP for V2 challenge-IP reconstruction) and records verified/unverified, and the upload-payload request carries peer_ident_verified so credits are attributed to the peer user hash only on a successful verify (oracle CClientCreditsList::VerifyIdent -> IS_IDENTIFIED gating credit attribution). Bumped again (+11) to wire OP_AICHANSWER -> ICH block-level salvage: the answer arm now calls the shared handle_aich_recovery_answer (ed2k_tcp/aich_salvage.rs) which drives Ed2kTransferRuntime::begin_part_salvage (keep the good 180KB blocks of a corrupt part, re-download only the bad blocks), replacing the prior decode-and-log stub; the salvage flow + block bitmap live in the new ed2k_transfer/salvage.rs + block_bitmap.rs modules within budget. Bumped again (+5) for A4: the upload peer identity carries an ident_verified flag set from the OP_SIGNATURE verification result (the constructors default it false and the OP_SIGNATURE arm syncs it on verify), so the credit ratio that feeds the upload score only benefits a cryptographically verified peer (oracle CClientCredits::GetScoreRatio neutral 1.0 unless IS_IDENTIFIED). Bumped again (+26) for C6: the inbound peer-identity constructors carry the upload-score modifier inputs (ident_bad_guy from a FAILED OP_SIGNATURE verify = IS_IDBADGUY, gpl_evildoer from the hello CT_MO