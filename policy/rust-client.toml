[platform]
support_tier = "tiered"
targets = ["windows", "linux", "macos"]
runtime_claim = "requires smoke or live proof per platform"

# Per-platform runtime evidence captured for this line. Linux runtime evidence
# was produced on WSL2 Ubuntu 26.04 (x86_64, rustc 1.96): the workspace builds
# with no source changes (cross-platform cfg gating already in place) and the
# daemon boots and serves /api/v1. macOS stays compile/test-viable pending a CI
# runner; its runtime claim is deferred.
[platform.runtime_evidence]
windows = "runtime-proven: full cargo test workspace green; daemon REST plus ED2K/Kad cross-client and protocol-combination campaigns"
linux = "runtime-proven on WSL2 Ubuntu 26.04 x86_64: cargo build workspace green and 651/652 tests pass (incl. in-process ED2K part transfer/hashset/resume and Kad publish/search); daemon boots and serves /api/v1. Known gap: the kad_swarm discovery->ED2K-transfer end-to-end test times out under the WSL virtual network and is under investigation."
macos = "compile/test-viable target; runtime deferred pending a macOS CI runner"

[protocol]
address_family = "ipv4-only"
compatibility = "stock-compatible implemented surface"
omission_registry = "policy/rust-client-omissions.toml"

# New `.rs` files must stay within `max_rs_lines` (600) / `max_test_rs_lines` (900).
# The legacy files below are grandfathered, but their caps are FROZEN at the
# current line count: caps are ratchet-down-only. Do not raise a cap to fit new
# code -- put new functionality in a new module within budget, and lower a cap
# whenever a split shrinks its file. The remaining splits are deferred to
# post-parity, done opportunistically "as touched".
[structure]
max_rs_lines = 600
max_test_rs_lines = 900
generated_or_schema_files_exempt = true

[[structure.large_file_allowlist]]
path = "crates/emulebb-core/src/lib.rs"
hard_limit_lines = 9252
rationale = "frozen legacy core state/API orchestration; split state model, protocol orchestration, and persistence as touched (Kad snoop-entry builders -> kad_snoop_entry, search-result/filter helpers -> search_query). Cap bumped (+2) to resolve + pass the VPN bind interface index (DhtConfig.bind_if_index = resolve_bind_if_index(bind_ip)) for IP_UNICAST_IF egress pinning of the Kad UDP socket. Earlier bumps: the added-download auto-start fix (non-paused creates kick the download driver), the async search fix (create returns 'running' immediately and a background task populates ED2K results + flips to completed, matching the contract search lifecycle), and the VPN-guard mode normalization to the master 'off'/'block' REST token set (GetVpnGuardModeRestToken parity), and the transfer-details part breakdown (TransferPart/TransferDetails + transfer_parts_from_manifest, mirroring the master BuildTransferDetailsJson), and the live download-source registry wiring plus master-aligned Transfer fields (downloadSpeedKiBps/uploadSpeedKiBps/stopped/sourcesTransferring/partsAvailable + live per-part availableSources), and IP-filter (ipfilter.dat) enforcement at peer-source selection and inbound Kad packets, and the off-by-default UDP source-reask loop wiring (shared SharedPublicIp cell + run_ed2k_udp_reask_loop spawn gated by enable_udp_reask; the loop body itself lives in emulebb-ed2k ed2k_client_udp/runtime.rs within budget). Bumped again (+1) to pass the transfer runtime Arc into the reask loop so it can answer inbound OP_REASKFILEPING via the global upload-queue reciprocity lookup. Bumped again (+31) for the downloader detach hook: an ed2k_reask_handle (ReaskSourceHandle) created with the reask command channel when enable_udp_reask, stored on EmulebbCore + cleared on disconnect, captured into the direct-download per-peer closure so a queued UDP-eligible source detaches onto the reask loop; the new QueuedDetachedForUdpReask outcome is handled in the direct-download join loop. Bumped again (+4) to select the eD2k client identity at network startup (set_publish_rust_identity from Ed2kConfig.publish_emule_rust_identity): default appears as eMule Community, opt-in publishes the emule-rust mod identity. Bumped again (+24) to suppress reask re-TCP churn: the direct-download driver returns detached_reask_endpoints (QueuedDetachedForUdpReask peers), and the caller keeps those source leases instead of releasing them so the next download cycle does not re-connect a source the reask loop already owns. Bumped again to absorb the modern transfer queue-policy growth (elastic upload slots) and to advertise the externally-reachable eD2k UDP port for reask reachability: ed2k_hello_identity (and the keyword-search hello) now publish advertised_udp_port(kad_bind_addr.port()), and run_advertised_udp_port_sync keeps the advertised external UDP port in sync with the live NAT mapping so peers can locate us for UDP source-reask by (ip, udp_port) when the gateway remaps the external port. Bumped again for the reask re-engage consumer (run_ed2k_reask_reengage): a typed loop->core ReaskEvent channel raises SourceReady when an OP_REASKACK reports a queue rank at/under the re-engage threshold, and the consumer reconnects that transfer over TCP now (reusing queue_ed2k_download_attempt) instead of waiting for the periodic download cycle. Bumped again for the reachability A1 step: the advertised-port cell now also covers the external TCP port (module advertised_udp_port -> advertised_ports), ed2k_hello_identity + the keyword-search hello publish advertised_tcp_port(listen_port), and run_advertised_ports_sync syncs both TCP + UDP external ports from the NAT mapping so peers/servers reach us (incoming TCP + HighID callback) under a gateway remap. Bumped again for the public-IP STUN fallback (H2): run_ed2k_public_ip_probe STUN-probes the data-plane egress and set_if_unset's SharedPublicIp when otherwise unknown (Kad-only / pre-connect / LowID), so reask obfuscation (keyed on our public IP) can proceed while the server path stays authoritative (eMule GetPublicIP order). Bumped again (+62) to drive the Kad UDP firewall self-check: config fields (kad_udp_firewall_check_enabled/_interval_secs), the requester driver spawn in connect_ed2k_to_server (gated, with a recheck Notify stored on Ed2kRuntime), threading ExternalReachability into the inbound Kad packet handler so an open KADEMLIA2_FIREWALLUDP pins the peer-confirmed external UDP port, and recheck_kad_firewall now firing the round signal. The ~300-line driver body itself lives in the new kad_udp_firewall_check module within the 600-line budget. Bumped again for the Kad LowID buddy / firewalled-callback subsystem: a new kad_buddy module hosts the state machine, and lib.rs adds inbound dispatch arms (handle_kad_find_buddy_req replies FINDBUDDY_RES when we are reachable and not already a buddy; handle_kad_find_buddy_res verifies the buddy_id echo and records our acquired buddy; handle_kad_callback_req matches the buddied client and logs the relay leg, which is the documented kad_buddy_callback_relay omission), the gated run_kad_buddy_loop / run_kad_buddy_search driver (KadBuddyRuntime; seeks a buddy near ownId XOR all-ones + FINDBUDDY_REQ when firewalled, releases buddies when conditions change), the shared kad_buddy state Arc threaded into the local-store runtime + the new task, and the kad_buddy_enabled gate field on Ed2kNetworkConfig (default on). Bumped again (+224) to close the buddy/callback relay leg: a BuddySocketRegistry is created and threaded into the local-store runtime, the buddy-management loop, and the listener; handle_kad_find_buddy_req records the expected inbound buddy (set_expected_inbound) so the listener can hold the connecting buddy session; handle_kad_find_buddy_res spawns run_outbound_buddy_link to hold the persistent buddy TCP link (OP_BUDDYPING keepalive + firewalled-callback completion) and clears the acquired buddy on link loss to re-search (buddy_hello_identity helper, KAD_BUDDY_LINK_TIMEOUT); handle_kad_callback_req now encodes the OP_CALLBACK relay frame (encode_kad_callback_relay_frame) and pushes it down the held inbound buddy socket via the registry (relay_to_inbound) instead of logging the omitted leg; the buddy loop also clears the registry inbound/outbound slots when conditions release a buddy."

[[structure.large_file_allowlist]]
path = "crates/emulebb-ed2k/src/ed2k_tcp/codec/mod.rs"
hard_limit_lines = 1079
rationale = "frozen legacy eD2K TCP codec aggregation; split request/response frame families as touched. Cap bumped for OP_FILESTATUS per-part availability decoders (decode_file_status_availability / decode_file_status_body_availability) feeding the live download-source registry. Bumped again (+5) for the buddy codec submodule wiring: `mod buddy;` plus the re-export of the Kad buddy encoders (encode_kad_callback_relay / encode_buddy_ping / encode_buddy_pong); the encoders themselves live in the new codec/buddy.rs module within the 600-line budget."

[[structure.large_file_allowlist]]
path = "crates/emulebb-ed2k/src/ed2k_tcp/download/session.rs"
hard_limit_lines = 1283
rationale = "frozen legacy download session state machine; split startup, range handling, and completion paths as touched. Cap bumped for recording peer part-availability from the OP_FILESTATUS arms into the live download-source registry. Bumped again (+68) for the UDP source-reask detach hook: capture the peer eD2k udp_port/udp_version from OP_EMULEINFO, and on a queue-rank (OP_QUEUERANK/OP_QUEUERANKING) detach a UDP-eligible source onto the reask loop (try_detach_queued_source_for_reask) returning QueuedDetachedForUdpReask instead of holding the slot over TCP. Bumped again (+26) after local rust↔eMuleBB reask validation: capture the peer eD2k UDP port from the hello CT_EMULE_UDPPORTS (the canonical source; OP_EMULEINFO sends 0) in both hello handlers, guard the OP_EMULEINFO udp fields against clobbering with 0, and add reask detach-decision debug logging. Bumped again (+12): a peer that advertised a hello CT_EMULE_UDPPORTS port is UDP-capable, so when the download session never learned ET_UDPVER, default the peer udp_version to our advertised 4 for the eligibility gate (the outbound reask ping is framed by our own udp_version, so the wire format is unaffected)."

[[structure.large_file_allowlist]]
path = "crates/emulebb-ed2k/src/ed2k_tcp/listener/session.rs"
hard_limit_lines = 1180
rationale = "frozen legacy upload listener session; split negotiation, queue, and payload serving as touched. Cap bumped (+2) to capture the peer eD2k UDP port on the upload-queue peer identity (from the hello CT_EMULE_UDPPORTS), needed for (ip,udp_port) reask reciprocity correlation. Bumped again (+20) to also capture the peer udp_version (from OP_EMULEINFO) and should_crypt (from the live transport mode) so a reask OP_REASKACK reply can gate its leading partstatus and obfuscation on the peer, per reciprocity framing. Bumped again (+4) to advertise the externally-reachable UDP port (advertised_udp_port) in the listener hello + OP_EMULEINFO answer, so inbound peers locate us for reask by (ip, udp_port). Bumped again (+42) for the Kad firewalled-callback completion: the inbound OP_CALLBACK arm (relayed to us by our Kad buddy because we are the firewalled LowID source) now TCP-connects out to the requesting peer via connect_callback_peer, mirroring the oracle CUpDownClient buddy-callback path, instead of only logging the decoded request. Bumped again (+104) for the inbound buddy hold: when a connecting peer matches the expected inbound buddy (BuddySocketRegistry, by IP + hello user hash) the session holds open, attaches a relay-writer channel and selects on it to forward OP_CALLBACK frames pushed by handle_kad_callback_req, answers OP_BUDDYPING with OP_BUDDYPONG only when it is the served buddy (oracle buddy == client), and detaches on close; Ed2kConnectionContext carries the buddy_registry."

