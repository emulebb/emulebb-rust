tests (multi-file peer reused + not double-engaged; an NNP source swapped to another wanted file; an NNP source with no other wanted file dropped; a completed other file rejected as a swap target) and the a4af_test_transfer helper. The cross-transfer source state itself lives in the existing download_source_registry / download_coordinator modules within budget; lib.rs carries the driver hook + the swap method + the tests. Bumped again (+9, 7219 -> 7228) for uniform-diagnostics-v2 lane D2: the cross-transfer download driver now emits family:\"sched\" diag_event_v1 events at the natural decision sites (conn_budget at the source-connect budget gate via try_acquire_source_connection_detailed; source_engaged/source_dropped at acquire_direct_download_source_leases; source_swapped at the A4AF NNP swap_target_for_peer hit), plus the new `mod diag_sched;` declaration; the keys/body mapping itself lives in the new diag_sched module within the 600-line budget, lib.rs carries only the call-site emit lines + the module decl. Bumped again (+20, 7228 -> 7248) for uniform-diagnostics-v2 lane E (kad_event family): lib.rs now emits family:\"kad_event\" diag_event_v1 milestones at the Kad driver decision sites it owns -- buddy_established/buddy_released at the buddy acquisition (handle_kad_find_buddy_res) and link-loss sites, and the periodic routing_summary (connected/bootstrapping/firewalled/lanMode + routing-table contact counts via DhtNode::routing_summary_counts) from the 30s run_kad_buddy_loop maintenance tick (matching the master's LogRoutingSummary cadence) -- plus the new `mod diag_kad_event;` declaration; the firewall + lookup_complete milestones emit from their own modules (kad_udp_firewall_check, ed2k_sources) and the keys/body mapping lives in the new diag_kad_event module within the 600-line budget, lib.rs carries only the buddy/routing_summary call sites + the module decl. Bumped again (+16, 7248 -> 7264) to wire the periodic Kad routing-table maintenance loop (oracle CRoutingZone OnBigTimer/OnSmallTimer): the `mod kad_routing_maintenance;` decl plus the gated spawn site (run_kad_routing_maintenance_loop, gated by network.kad_routing_maintenance_enabled); the loop body itself (bucket-refresh RandomLookup + dead-contact expiry + stale-contact HELLO re-probe) lives in the new kad_routing_maintenance module within the 600-line budget. Bumped again (+15, 7264 -> 7279) for the HELLO_RES tag-gating parity test (kad_hello_response_tags_gate_both_tags_like_request_and_oracle): build_kad_hello_response_tags now gates SOURCEUPORT + KADMISCOPTIONS with the same predicates as the request builder (oracle SendMyDetails, KademliaUDPListener.cpp:146-168) instead of emitting both unconditionally; the gating helper lives in kad_hello, lib.rs carries only the test. Bumped again (+251, 7279 -> 7530) for the round-6 Kad publish + concurrency/shutdown fixes: A1/A3 replace the flat 30-min republish loop with the master CSharedFileList::Publish model -- run_kad_shared_file_publish_loop now carries the firewall/buddy state (KadPublishLoopRuntime) and republishes only the files whose per-file, per-kind interval is due (keyword 24h KADEMLIAREPUBLISHTIMEK / source 5h KADEMLIAREPUBLISHTIMES via the new kad_publish_schedule module's KadPublishSchedule), gated by kad_publish_allowed (the SharedFileList.cpp:3066-3076 firewalled-without-buddy-and-UDP-closed predicate); B1 drains + releases the remaining direct-download connection-budget slots on a worker-panic JoinError (was leaking them); B2 moves the active_download_attempts dedup insert behind a DownloadAttemptGuard whose Drop removes the hash on every exit path incl. unwind, with the attempt/retry bodies extracted to run_queued_ed2k_download_attempt/_retry; B3 tracks the detached background-download tasks in a per-session JoinSet (ed2k_download_tasks, mirrored on Ed2kRuntime.download_tasks, reset per connect) and abort_all()'s them in disconnect_ed2k so downloads no longer survive disconnect/orphan on shutdown; B4a isolates each run_ed2k_reask_reengage event in a spawned task awaited for panic so a transient panic cannot stop source-lease releases. The schedule/gate logic lives in the new kad_publish_schedule module within the 600-line budget; lib.rs carries the loop wiring, the per-session task tracking, the RAII guard, and the B1 drain + new panic-resilience test. Bumped again (+335, 7530 -> 7865) for the round-7a server/source parity fixes: FIX 2 (dead-server fail-count + drop, eMule CServerList::ServerStats IncFailedCount + RemoveServer at GetDeadServerRetries, default 1) adds a server_fail_counts map on CoreState + the run_ed2k_server_list_events consumer's note_ed2k_server_connect_failed/_succeeded core methods (increment on failed connect/ping, drop a non-static dead server at the threshold, reset on a successful login; static servers are never dropped) plus the resolve_server_event_endpoint matcher; FIX 3 (OP_SERVERLIST auto-add, eMule CServerSocket::ProcessPacket) adds merge_discovered_ed2k_servers (decode + dedup against existing/disabled, low-priority add without auto-connect); FIX 5 (self / dead-source merge filter, eMule CDownloadQueue::CheckAndAddSource) applies drop_self_sources in acquire_ed2k_sources (own user-hash or (ip, tcp_port) endpoint exclusion). The decode/event-channel logic lives in the new emulebb-ed2k ed2k_server/server_events module and the OwnSourceIdentity/drop_self_sources helpers in ed2k_sources, both within budget; lib.rs carries the three server-store methods + the consumer spawn wiring + the self-source filter call + the FIX 2/3 integration tests. Bumped again (+91, 7865 -> 7956) for the round-7b security/abuse-protection slice: FIX 1 (functional ban subsystem, eMule CClientList ban lists + CLIENTBANTIME 4h) backs the REST ban_upload_client/ban_transfer_source with the new shared BanStore (resolve client_id -> IP/user-hash via parse_ban_ip/parse_ban_hash, ban_client + ban_store().unban with the 4h TTL) and gates source add/merge in run_ed2k_download_attempt (sources.retain on ban_store.is_banned, eMule CheckAndAddSource/PartFile.cpp IsBannedClient); FIX 4 (CIPFilter::Reload) adds reload_ip_filter (re-reads the configured ipfilter.dat into the now-shared IpFilter backing) plus the ip_filter_path/ip_filter_level network-config fields. The ban store itself, its key/TTL semantics, and the corrupt-data trigger live in the new emulebb-ed2k ban_store module within the 600-line budget; lib.rs carries only the REST backing + the source-add gate + the reload method + the parse-helper + ban-parse tests. The ban list is in-memory only (NOT persisted across restart, matching the master). Bumped again (+149, 7956 -> 8105) for the round-8 fixes: FIX 1 wires the inbound OP_DIRECTCALLBACKREQ connect-out (ReaskReengageContext + handle_direct_callback_req gate on current_tcp_firewalled, mirroring ClientUDPSocket.cpp -> TryToConnectOrDelete), FIX 2 makes recheck_transfer drive a real on-disk part re-verification (set hashing -> piece-store recheck_transfer -> re-derive state, re-engage on corruption), FIX 3b wires the dormant publish_notes into publish_kad_due_shared_files (24h notes interval, per-file gated on a comment/rating, STORENOTES taglist + dht.own_id() publisher id), FIX 4 wires the creditSystem toggle (set_credit_system_enabled at startup + update_preferences) and the networkKademlia/networkEd2k gates (bootstrap_kad / connect_ed2k_to_server refuse when disabled), and FIX 6 aligns default_preferences to the master values. The reask-event consumer + connect-out helper, the credit/network gates, and the notes-publish block live inline in the existing drivers; the heavy logic stays in the lower crates (piece-store recheck, codec, schedule). Bumped again (+16, 8105 -> 8121) for round-8 FIX 6's default-preferences-match-the-master integration test (asserts the master-aligned default_preferences values: upload 6200 / download 12207 / maxConnections 500 / maxConnectionsPerFiveSeconds 50 / maxSourcesPerFile 600 / maxUploadSlots 12 / elasticPercent 80 / queueSize 10000). Bumped again (+8, 8121 -> 8129) for the connection-management safe-subset FIX 3 connect/callback timeout budgets: the LowID source callback wait is raised from connect_timeout_secs.max(30) to the new config callback_timeout_secs (eMule ClientList.cpp:1059 SEC2MS(45), default 45) floored at connect_timeout_secs, while the direct peer connect stays conservative (~15s). The half-open cap (FIX 1) and inbound-accept admission cap (FIX 2) live in the emulebb-ed2k coordinator + transfer-runtime modules; lib.rs carries only the callback-timeout wiring + a clarifying comment. Bumped again (+80, 8129 -> 8209) to fix the detached-reask source lease leak on disconnect/shutdown: when the UDP reask loop breaks on shutdown / command-channel close, still-detached sources never emit ReaskEvent::SourceReleased, so disconnect_ed2k now resets every outstanding download source lease (download_source_registry.reset_leases() clears leased_peers and returns the endpoints, and the matching active_download_peer_endpoints entries are removed) before the runtime is torn down; without this those endpoints stayed leased across reconnect and acquire_direct_download_source_leases deferred them forever. Race-safe because disconnect fully tears the download stack down before any reconnect rebuilds it. The reset_leases method itself lives in the download_source_registry module within budget; lib.rs carries the disconnect reset block + the re-engageability integration test (disconnect_releases_detached_reask_source_leases_and_re_engages). Bumped again (+14, 8209 -> 8223) to fix the per-file candidate over-count of dead candidates: DownloadSourceCandidate now carries a last_seen Instant stamped by add_candidate, candidate_count_for_file (the soft per-file cap input, eMule GetMaxSourcePerFileSoft > GetSourceCount) counts only candidates fresher than CANDIDATE_LIVENESS_TTL (60 min, on the order of the source requery/reask window), and acquire_direct_download_source_leases opportunistically prune_stale_candidates() each cycle so a long-lived transfer keeps engaging fresh live sources instead of hitting the soft cap on stale/dead candidates and the peers map stays bounded; lib.rs carries the now/prune wiring + the last_seen stamping at the two call sites (the TTL logic + a stale-aging unit test live in the download_source_registry module within budget). Bumped again (+287, 8223 -> 8510) for the per-hash download cancellation primitive that fixes the REST lifecycle bug cluster (delete leaks leases + orphan attempt; pause/stop does not stop the in-flight attempt; recheck races a live write): CoreState gains a download_cancels map (hash -> (generation id, CancellationToken)) + next_download_cancel_id; run_queued_ed2k_download_attempt installs a fresh token per attempt and DownloadAttemptGuard removes it on exit only when its generation id still matches (so a delete/recreate of the same hash never clobbers the newer attempt's token); run_ed2k_download_attempt takes the token and checks is_cancelled() before any work, at the top of each requery round, and mid-round after the direct-download leg, returning Ok(None) so a cancelled attempt neither rewrites the transfer state nor re-queues a retry; cancel_download_attempt + teardown_download_for_delete are the quick-lock cancel helpers (no await held); delete_transfer_files now calls teardown_download_for_delete (cancel + DownloadSourceRegistry::release_file to drop the hash's candidates + release only that file's leases, drop the matching active_download_peer_endpoints, clear the dedup + cancel slots) so delete frees everything immediately and a re-create re-downloads; set_transfer_control_state (pause/stop) and recheck_transfer cancel the in-flight attempt so it stops now rather than at the next retry / racing the re-verify write. release_file lives in the download_source_registry module within budget (with its own unit test); lib.rs carries the CoreState fields, the guard extension, the two cancel helpers, the driver checks, the three call-site wirings, and the three #[tokio::test] integration tests (delete cancels + releases the hash's leases/endpoints/slots; a pre-cancelled attempt returns Ok(None); pause cancels the in-flight attempt). Bumped again (+15, 8510 -> 8525) for the round-11 REST robustness fixes: remove_server now disconnects the live eD2k session when the removed endpoint is the currently-connected one (ed2k_connected_endpoint match -> disconnect_ed2k) so the store never keeps a live connection to a server it no longer holds; and delete_category now resets every transfer that referenced the deleted category back to uncategorized (category_id = 0 / category_name cleared) so a transfer's category_id can no longer dangle at a removed id (category state is in-memory on the Transfer, not persisted per-transfer). The delete_category reset integration test lives in tests/profile_persistence.rs within the test budget; lib.rs carries only the two small fix bodies. Bumped again (+28, 8525 -> 8553) for the live shared-directory monitor (auto-pickup; eMule CSharedFileList directory auto-monitor parity): EmulebbCore gains a shared_dir_monitor field (Arc<std::sync::Mutex<Option<SharedDirMonitor>>>) + its constructor init, CoreState gains a monitor_shared_hashes (source-path -> content-hash) map so a remove/rename-away event (file already gone, cannot be re-hashed) resolves the catalog hash to drop, and two thin entry methods (start/stop_shared_directory_monitor) delegate to the new shared_dir_monitor module; the lifecycle is wired at three call sites (set_shared_directories re-establishes the watch set; disconnect_ed2k stops the monitor as part of the R11-2 graceful teardown). The whole watcher design -- the notify + notify-debouncer-full thread->channel->tokio bridge, the settled-event share/remove classifier, the consumer's idempotency, the per-root recursive watch with graceful per-root degradation (incl. the Linux inotify watch-limit case), and the auto-share (share_local_file) / auto-remove (unshare_file) orchestration bodies -- lives in the new shared_dir_monitor module within the 600-line budget; lib.rs carries only the field, the CoreState map, the two thin methods, and the three lifecycle call sites. Bumped again (+16, 8553 -> 8569) for B1 finished-file delivery (eMule move-to-Incoming-by-name): EmulebbCore gains an incoming_dir field (default sibling of the transfer root; the daemon overrides it from the incomingDir config via with_incoming_dir) + its constructor init, and the download-completion path (run_queued_ed2k_download_attempt) and a confirming recheck now call deliver_completed_transfer before refreshing the in-memory transfer so the materialized file lands by name and the refreshed view surfaces deliveredPath. The delivery wiring methods (with_incoming_dir/incoming_dir/delivery_destination_dir/deliver_completed_transfer/deliver_pending_completed_transfers) live in the new core delivery module, and the link/copy/collision/long-path mechanics live in emulebb-ed2k ed2k_transfer/deliver.rs (materialize_completed_payload), both within the 600-line budget; lib.rs carries only the incoming_dir field + default and the two completion-hook call sites. Bumped again (+22, 8569 -> 8591) for two cheap-hardening items: (1) the /app lifecycle state — EmulebbCore gains a `lifecycle` AtomicU8 (default running) + its init, app_info reports the real `lifecycle_state_name()` instead of a hardcoded \"running\", and the daemon flips it via `begin_shutdown()` at graceful teardown (the state<->token mapping + begin_shutdown live in the new core `lifecycle` module within budget; lib.rs carries the field + init + the app_info call); (2) the download disk free-space floor — `run_ed2k_download_attempt` pauses before engaging sources when the transfer-root volume cannot hold the remaining payload (instead of failing late mid-write and churn-retrying), via the new core `disk_guard` module's `should_pause_download_for_disk_space` (which uses emulebb-ed2k `disk_space` over fs4); lib.rs carries the `mod disk_guard;` decl + the gate call site. Bumped again (+4, 8591 -> 8595) for seed-shared-complete-files-in-place: a shared, already-complete file (added via a shared directory) is now seeded for upload directly from its original on-disk path instead of being copied into the internal piece store and run through the download-completion delivery path. The manifest gains a `source_path` (Some == share-in-place; ingest records the original path and no longer copies into pieces.bin; upload serving via read_verified_range reads the original file; finished-file delivery skips share-in-place). lib.rs carries only the transfer_from_manifest path resolution (report the original source_path for a share, else the piece-store payload path); the ingest/serve/persist mechanics live in the lower crates (emulebb-ed2k ingest/piece_store/model + emulebb-metadata schema v8 source_path column) and the delivery skip lives in the core `delivery` module. Bumped again (+46, 8595 -> 8641) for the connection-ordering HighID fix (bind -> VPN guard -> UPnP await -> connect): connect_ed2k_to_server now AWAITS one initial UPnP reconcile (NatManager::reconcile_now, bounded by ED2K_UPNP_INITIAL_RECONCILE_TIMEOUT=20s) right after nat.start() and copies the gateway-granted external eD2k TCP + Kad UDP ports into ed2k_reachability (sync_advertised_ports_from_nat) BEFORE the server loop is spawned, so the first OP_LOGINREQUEST announces the already-forwarded listen port and wins HighID on the first connect instead of racing the background reconcile loop (best-effort: a reconcile failure/timeout logs and connects with internal ports, the periodic sync still upgrades reactively). The matcher logic moved into the new pure ed2k_net_drivers::external_port_for/sync_advertised_ports_from_nat helpers (shared by the await-once path and the periodic poll, no drift), and run_advertised_ports_sync now baselines