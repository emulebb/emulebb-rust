[platform]
support_tier = "tiered"
targets = ["windows", "linux", "macos"]
runtime_claim = "requires smoke or live proof per platform"

# Per-platform runtime evidence captured for this line. Linux runtime evidence
# was produced on WSL2 Ubuntu 26.04 (x86_64, rustc 1.96): the workspace builds
# with no source changes (cross-platform cfg gating already in place) and the
# daemon boots and serves /api/v1. macOS stays compile/test-viable pending a CI
# runner; its runtime claim is deferred.
[platform.runtime_evidence]
windows = "runtime-proven: full cargo test workspace green; daemon REST plus ED2K/Kad cross-client and protocol-combination campaigns"
linux = "runtime-proven on WSL2 Ubuntu 26.04 x86_64: cargo build workspace green and 651/652 tests pass (incl. in-process ED2K part transfer/hashset/resume and Kad publish/search); daemon boots and serves /api/v1. Known gap: the kad_swarm discovery->ED2K-transfer end-to-end test times out under the WSL virtual network and is under investigation."
macos = "compile/test-viable target; runtime deferred pending a macOS CI runner"

[protocol]
address_family = "ipv4-only"
compatibility = "stock-compatible implemented surface"
omission_registry = "policy/rust-client-omissions.toml"

[review_reporting]
# Intentional omissions are already product decisions, not open parity gaps.
# Reviews must not report these surfaces again unless the implementation starts
# advertising or partially implementing one of them.
intentional_omissions_are_not_gaps = true
excluded_surface_ids = [
    "sx1-live-source-exchange",
    "conn-rate-rolling-five-second-window",
    "conn-rate-spike-modifier",
    "upload-throttle-focus-slot-distribution",
    "source-supplement-scarcity-gate",
    "ipv6-ed2k-kad",
    "legacy-html-webserver",
    "peer-chat-messaging",
    "ed2k-preview",
    "time-based-scheduler",
    "pref-safe-server-connect",
    "pref-new-auto-up",
    "pref-new-auto-down",
    "pref-download-auto-broadband-io",
]

# Windows long-path (>260 char) support is SCOPED to operator-facing content
# paths only (the operator rule, also recorded in AGENTS.md). See the
# `emulebb_ed2k::long_path` module doc for the authoritative mechanism notes.
[long_path]
# The ONLY path classes that get long-path handling.
allowed_classes = [
    "shared-directory trees (shared roots + every scanned/ingested file under them)",
    "incoming downloads (download/incoming output destination + completed-file paths)",
    "category paths (per-category download/incoming directories)",
]
# These STAY SHORT-PATH ON PURPOSE -- never add long-path handling here.
never_classes = [
    "config file path",
    "log paths",
    "SQLite metadata DB path",
    "hash-named per-transfer piece-store dirs (transfer_dir(file_hash)/pieces.bin)",
    "all other internal paths",
]
# Mechanism: (A) the daemon EXE embeds a longPathAware manifest via the
# `embed-manifest` crate from crates/emulebb-daemon/build.rs (Windows-gated);
# (B) the `emulebb_ed2k::long_path::long_path` helper applies the verbatim
# `\\?\` (and `\\?\UNC\`) form at exactly the three allowed boundaries.
manifest = "embed-manifest longPathAware in crates/emulebb-daemon/build.rs"
helper = "emulebb_ed2k::long_path::long_path"
# Current-model note: no separate operator download/incoming output path exists
# (completed payloads live in the internal short-path piece store), and
# Category.path is validated/stored but not yet used to open output files; the
# helper is wired where a category path is consumed so the boundary is ready.
current_model_note = "incoming + category output boundaries documented; wired where the category path is consumed"

# New `.rs` files must stay within `max_rs_lines` (1200) /
# `max_test_rs_lines` (1400) during the parity push. The legacy files below are
# grandfathered and remain refactor debt, but source-size caps are engineering
# guardrails rather than mechanical split triggers. Prefer extracting
# independent responsibilities into new modules within budget when it is cheap,
# and lower a cap whenever a split shrinks its file. During parity work, raise
# an allowlist cap when the touched behavior is one cohesive function or
# protocol decision surface and splitting it would harm readability, invariants,
# or parity evidence; refactor-only splits are deferred to post-parity and done
# opportunistically "as touched".
[structure]
max_rs_lines = 1200
max_test_rs_lines = 1400
generated_or_schema_files_exempt = true

[[structure.large_file_allowlist]]
path = "crates/emulebb-core/src/lib.rs"
hard_limit_lines = 11500
rationale = "frozen legacy core state/API orchestration; split state model, protocol orchestration, and persistence as touched (Kad snoop-entry builders -> kad_snoop_entry, search-result/filter helpers -> search_query). Cap bumped (+2) to resolve + pass the VPN bind interface index (DhtConfig.bind_if_index = resolve_bind_if_index(bind_ip)) for IP_UNICAST_IF egress pinning of the Kad UDP socket. Earlier bumps: the added-download auto-start fix (non-paused creates kick the download driver), the async search fix (create returns 'running' immediately and a background task populates ED2K results + flips to completed, matching the contract search lifecycle), and the VPN-guard mode normalization to the master 'off'/'block' REST token set (GetVpnGuardModeRestToken parity), and the transfer-details part breakdown (TransferPart/TransferDetails + transfer_parts_from_manifest, mirroring the master BuildTransferDetailsJson), and the live download-source registry wiring plus master-aligned Transfer fields (downloadSpeedKiBps/uploadSpeedKiBps/stopped/sourcesTransferring/partsAvailable + live per-part availableSources), and IP-filter (ipfilter.dat) enforcement at peer-source selection and inbound Kad packets, and the off-by-default UDP source-reask loop wiring (shared SharedPublicIp cell + run_ed2k_udp_reask_loop spawn gated by enable_udp_reask; the loop body itself lives in emulebb-ed2k ed2k_client_udp/runtime.rs within budget). Bumped again (+1) to pass the transfer runtime Arc into the reask loop so it can answer inbound OP_REASKFILEPING via the global upload-queue reciprocity lookup. Bumped again (+31) for the downloader detach hook: an ed2k_reask_handle (ReaskSourceHandle) created with the reask command channel when enable_udp_reask, stored on EmulebbCore + cleared on disconnect, captured into the direct-download per-peer closure so a queued UDP-eligible source detaches onto the reask loop; the new QueuedDetachedForUdpReask outcome is handled in the direct-download join loop. Bumped again (+4) to select the eD2k client identity at network startup (set_publish_rust_identity from Ed2kConfig.publish_emule_rust_identity): default appears as eMule Community, opt-in publishes the emule-rust mod identity. Bumped again (+24) to suppress reask re-TCP churn: the direct-download driver returns detached_reask_endpoints (QueuedDetachedForUdpReask peers), and the caller keeps those source leases instead of releasing them so the next download cycle does not re-connect a source the reask loop already owns. Bumped again to absorb the modern transfer queue-policy growth (elastic upload slots) and to advertise the externally-reachable eD2k UDP port for reask reachability: ed2k_hello_identity (and the keyword-search hello) now publish advertised_udp_port(kad_bind_addr.port()), and run_advertised_udp_port_sync keeps the advertised external UDP port in sync with the live NAT mapping so peers can locate us for UDP source-reask by (ip, udp_port) when the gateway remaps the external port. Bumped again for the reask re-engage consumer (run_ed2k_reask_reengage): a typed loop->core ReaskEvent channel raises SourceReady when an OP_REASKACK reports a queue rank at/under the re-engage threshold, and the consumer reconnects that transfer over TCP now (reusing queue_ed2k_download_attempt) instead of waiting for the periodic download cycle. Bumped again for the reachability A1 step: the advertised-port cell now also covers the external TCP port (module advertised_udp_port -> advertised_ports), ed2k_hello_identity + the keyword-search hello publish advertised_tcp_port(listen_port), and run_advertised_ports_sync syncs both TCP + UDP external ports from the NAT mapping so peers/servers reach us (incoming TCP + HighID callback) under a gateway remap. Bumped again for the public-IP STUN fallback (H2): run_ed2k_public_ip_probe STUN-probes the data-plane egress and set_if_unset's SharedPublicIp when otherwise unknown (Kad-only / pre-connect / LowID), so reask obfuscation (keyed