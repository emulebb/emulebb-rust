[[structure.large_file_allowlist]]
path = "crates/emulebb-ed2k/src/nat.rs"
hard_limit_lines = 800
rationale = "NAT reachability + UPnP port-mapping manager (NatManager, the reconcile/release provider abstraction, run_manager_loop, and the NatConfig/NatStatus/MappingSpec/MappedEndpoint model); the per-backend provider bodies live in the nat/{igd,miniupnpc,rupnp}.rs submodules. Allowlisted (598 -> 619) at the round-11 NAT robustness fixes: run_manager_loop now applies a bounded exponential failure backoff (30s doubling to a 5-minute cap, reset on the first success) instead of a flat 30s retry, and downgrades the repeated-failure log from warn to debug after the first failure so a point-to-point VPN with no IGD no longer warn-spams a 30s stream for the whole session; and the renew-margin narrowing uses u32::try_from(...).unwrap_or(u32::MAX) instead of an `as u32` cast that could wrap for an absurd config. Split the manager loop / model / provider-selection as touched post-parity. Bumped again (+27, 619 -> 646) for the connection-ordering fix (bind -> VPN guard -> UPnP await -> connect): the new NatManager::reconcile_now runs one reconcile pass synchronously (reusing reconcile_once) and returns once the port forward is confirmed complete (Ok) or definitively unavailable (Ok when disabled / no mappings) or every backend failed (Err), so the eD2k connect path can await the forwarded listen port BEFORE sending OP_LOGINREQUEST and win HighID on the first connect instead of racing the background reconcile loop. Three #[tokio::test]s cover it (awaits the mapping before returning, no-op when disabled without calling a backend, propagates backend failure)."

[[structure.large_file_allowlist]]
path = "crates/emulebb-ed2k/src/ed2k_tcp/codec/mod.rs"
