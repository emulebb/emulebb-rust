ew emulebb-kad-dht node/legacy_challenge.rs module within budget; lib.rs carries the two version-gated dispatch hooks + the two response arms. Cap RATCHETED DOWN (9738 -> 9044) by the maintainability restructuring (file-size freeze lifted 2026-06-15): the REST-facing DTO request/response structs and their serde helpers were extracted verbatim into the new rest_model module (re-exported from the crate root so every external path keeps working); behavior-preserving, same test counts. Ratcheted down again (9044 -> 8570) by moving the pure REST view builders + request validators (transfer/source/upload/server view construction + transfer/source/server/shared-file mutation validation) into the new views module within the 600-line budget; behavior-preserving, same test counts. Ratcheted down again (8570 -> 8257) by moving the Kad HELLO tag builders + the firewalled-response (UDP/TCP self-check) responder helpers into the new kad_hello module within the 600-line budget (the inbound packet dispatch stays in lib.rs and calls them); behavior-preserving, same test counts. Ratcheted down again (8257 -> 8161) by moving the download-category model helpers (default_categories + create/update appliers + name/path/color normalizers + the priority parser + the PR_* priority constants) into the new categories module within the 600-line budget; behavior-preserving, same test counts."

