n again (1295 -> 1208) by moving the eMule notify-only decode-and-log dispatch arm bodies (OP_PUBLICIP_ANSWER, OP_CALLBACK, OP_REASKCALLBACKTCP, OP_CHATCAPTCHAREQ/RES, OP_KAD_FWTCPCHECK_ACK, OP_BUDDYPING/PONG, OP_FILEDESC, OP_REQUESTPREVIEW, OP_PREVIEWANSWER) into the new download/session/notify.rs module within the 600-line budget; these arms carry no download-state effect (decode payload for the diagnostic dump only); behavior-preserving, same test counts. Ratcheted down again (1208 -> 1132) by moving the secure-identification dispatch arm bodies (OP_SECIDENTSTATE public-key/signature send + probe fallback, OP_PUBLICKEY record + signature send, OP_SIGNATURE RSA-verify + verdict dump) into the new download/session/secure_ident.rs module within the 600-line budget; behavior-preserving, same test counts. Bumped again (+9, 1132 -> 1141) for A4AF-lite NNP detection: the OP_OUTOFPARTREQS arm now returns the new Ed2kPeerDownloadOutcome::NoNeededParts variant (eMule DS_NONEEDEDPARTS) instead of AcceptedButIncomplete so the cross-transfer download driver can run the A4AF-lite swap (CUpDownClient::SwapToAnotherFile: move the source to another wanted file it serves rather than drop it); the swap logic itself lives in emulebb-core, this file only changes the one return + the variant doc comment. Bumped again (+120, 1141 -> 1261) for the silent No-Needed-Parts detection from the peer OP_FILESTATUS bitmap (master ProcessFileStatus IsPartAvailable parity): the three FILESTATUS-bearing arms (standalone OP_FILESTATUS, OP_MULTIPACKETANSWER, OP_MULTIPACKETANSWER_EXT2) now return Ed2kPeerDownloadOutcome::NoNeededParts when the peer advertises no part we still need (peer_holds_needed_part helper: a part is needed while not Verified), feeding the existing emulebb-core A4AF-lite swap instead of idling to the read timeout; includes a unit test module for the helper. Bumped again (+20, 1261 -> 1281) for AICH root corroboration (defense-in-depth + parity with CAICHRecoveryHashSet::AddHash/