tity helper, KAD_BUDDY_LINK_TIMEOUT); handle_kad_callback_req now encodes the OP_CALLBACK relay frame (encode_kad_callback_relay_frame) and pushes it down the held inbound buddy socket via the registry (relay_to_inbound) instead of logging the omitted leg; the buddy loop also clears the registry inbound/outbound slots when conditions release a buddy. Bumped again (+27) to surface the local Kad index sizes on the REST kad status: NetworkStatus gains indexed_sources / indexed_keywords (oracle CIndexed m_uTotalIndexSource / m_uTotalIndexKeyword) and kad_status reads them from the kad_local_store (source_entry_count / keyword_entry_count) so indexedSources / indexedKeywords are real instead of hardcoded 0. Bumped again (+23) for the live transfer throughput roll-up: a TransferThroughputStats struct + transfer_throughput_stats() expose the aggregate download rate (Ed2kTransferRuntime::aggregate_download_speed_bytes_per_sec, oracle CDownloadQueue::GetDatarate) and the session received/sent byte counters (oracle theStats.sessionReceivedBytes/sessionSentBytes) so the REST stats downloadSpeedKiBps / sessionDownloadedBytes / sessionUploadedBytes are real instead of 0. Bumped again (+120) for the Kad-subsystem firewall/buddy fixes: A1 rolls back an accepted incoming buddy when the FINDBUDDY_RES send fails; A3 validates a buddy-relayed OP_CALLBACK (uCheck-complement Kad-id check + Ed2kTransferRuntime::owns_file, threaded via KadLocalStoreRuntime.transfer_runtime); and the big A2 wires the requester-side Kad TCP firewall recheck driver (new kad_tcp_firewall_check module, spawned gated by kad_tcp_firewall_check_enabled): it sends KADEMLIA2_FIREWALLED2_REQ to open v6+ helpers, the inbound KadPacket::FirewalledRes arm routes replies into record_firewalled_response (authenticated via is_tcp_firewall_check_ip), and current_tcp_firewalled now consults the Kad TCP-firewalled verdict (KadFirewallState::tcp_firewalled, set from the listener's OP_KAD_FWTCPCHECK_ACK open acks) after the eD