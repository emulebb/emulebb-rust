e within the 600-line budget; the dispatch match stays in session.rs and calls the helpers; behavior-preserving, same test counts. Ratcheted down again (1289 -> 1174) by moving the decode-and-log dispatch arm bodies that carry no upload/session-state effect (OP_OUTOFPARTREQS, OP_CHANGE_CLIENT_ID, OP_CHANGE_SLOT, OP_MESSAGE, OP_QUEUERANK, OP_QUEUERANKING, OP_PUBLICIP_ANSWER, OP_REASKCALLBACKTCP, OP_CHATCAPTCHAREQ/RES, OP_FILEDESC, OP_REQUESTPREVIEW, OP_PREVIEWANSWER, OP_BUDDYPONG) into the new listener/session/notify.rs module within the 600-line budget; the stateful OP_CALLBACK connect-out arm (which holds the IPv6 bind-address rejection) stays in session.rs; behavior-preserving, same test counts. Ratcheted down again (1174 -> 1081) by moving the secure-identification dispatch arm bodies (OP_SECIDENTSTATE public-key/signature send + probe fallback, OP_PUBLICKEY record + signature send, OP_SIGNATURE RSA-verify + ident_verified/ident_bad_guy sync onto the upload identity) into the new listener/session/secure_ident.rs module within the 600-line budget; behavior-preserving, same test counts. Bumped again (+3, 1081 -> 1084) for the new Ed2kPeerDownloadOutcome::NoNeededParts variant added for A4AF-lite: this listener's inbound-callback download match is exhaustive and gains an arm for the variant (inbound callback downloads have no cross-transfer driver to run the swap, so NNP is treated like accepted-incomplete, break Ok). Bumped again (+3, 1084 -> 1087) for outbound secure-ident V2 signature selection: the hello handler now captures the peer's raw SUI level (hello_profile.misc_options1.secure_ident) and our HighID public IP (reachability.get()) onto the peer secure-ident state so try_send_secure_ident_signature can sign V2 (challenge-IP + ip-kind) for a V2-only peer (m_bySupportSecIdent bit 0 clear) and V1 otherwise, mirroring master BaseClient.cpp SendSignaturePacket; dispatch-site wiring that cannot move to a module. Bumped again (+22, 930 -> 952) for uniform-diagnost