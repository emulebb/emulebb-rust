[platform]
support_tier = "tiered"
targets = ["windows", "linux", "macos"]
runtime_claim = "requires smoke or live proof per platform"

# Per-platform runtime evidence captured for this line. Linux runtime evidence
# was produced on WSL2 Ubuntu 26.04 (x86_64, rustc 1.96): the workspace builds
# with no source changes (cross-platform cfg gating already in place) and the
# daemon boots and serves /api/v1. macOS stays compile/test-viable pending a CI
# runner; its runtime claim is deferred.
[platform.runtime_evidence]
windows = "runtime-proven: full cargo test workspace green; daemon REST plus ED2K/Kad cross-client and protocol-combination campaigns"
linux = "runtime-proven on WSL2 Ubuntu 26.04 x86_64: cargo build workspace green and 651/652 tests pass (incl. in-process ED2K part transfer/hashset/resume and Kad publish/search); daemon boots and serves /api/v1. Known gap: the kad_swarm discovery->ED2K-transfer end-to-end test times out under the WSL virtual network and is under investigation."
macos = "compile/test-viable target; runtime deferred pending a macOS CI runner"

[protocol]
address_family = "ipv4-only"
compatibility = "stock eMule parity by default; SX1 and the Kad LAN-mode flood exemption are the pre-approved permanent drops"
omission_registry = "policy/rust-client-omissions.toml"

[review_reporting]
# Non-SX1 entries in the omission registry are known divergence records under
# re-audit, not permanent product exclusions. Reviewers must report them until
# a fresh disposition says "fix", "defer", or "permanent drop".
intentional_omissions_are_not_gaps = false
excluded_surface_ids = [
    "sx1-live-source-exchange",
    # RUST-PAR-018 round-18 disposition (2026-07-08): the oracle's LAN-mode-only
    # Kad flood exemption would only reduce leniency toward LAN sources absent on
    # a public VPN'd node; permanent drop. See the entry's review_disposition.
    "kad-flood-lan-exemption",
    # RUST-PAR-019 round-19 permanent-drop dispositions (2026-07-08): headless /
    # IPv4-only / GUI-only surfaces with no wire fingerprint. See each entry's
    # review_disposition_note in rust-client-omissions.toml.
    "ipv6-ed2k-kad",
    "legacy-html-webserver",
    "pref-new-auto-up",
    "pref-new-auto-down",
    "pref-download-auto-broadband-io",
    "time-based-scheduler",
    "ed2k-partial-file-preview",
]

# Windows long-path (>260 char) support is SCOPED to operator-facing content
# paths only (the operator rule, also recorded in AGENTS.md). See the
# `emulebb_ed2k::long_path` module doc for the authoritative mechanism notes.
[long_path]
# The ONLY path classes that get long-path handling.
allowed_classes = [
    "shared-directory trees (shared roots + every scanned/ingested file under them)",
    "incoming downloads (download/incoming output destination + completed-file paths)",
    "category paths (per-category download/incoming directories)",
]
# These STAY SHORT-PATH ON PURPOSE -- never add long-path handling here.
never_classes = [
    "config file path",
    "log paths",
    "SQLite metadata DB path",
    "hash-named per-transfer piece-store dirs (transfer_dir(file_hash)/pieces.bin)",
    "all other internal paths",
]
# Mechanism: (A) the daemon EXE embeds a longPathAware manifest via the
# `embed-manifest` crate from crates/emulebb-daemon/build.rs (Windows-gated);
# (B) the `emulebb_ed2k::long_path::long_path` helper applies the verbatim
# `\\?\` (and `\\?\UNC\`) form at exactly the three allowed boundaries.
manifest = "embed-manifest longPathAware in crates/emulebb-daemon/build.rs"
helper = "emulebb_ed2k::long_path::long_path"
# Current-model note: no separate operator download/incoming output path exists
# (completed payloads live in the internal short-path piece store), and
# Category.path is validated/stored but not yet used to open output files; the
# helper is wired where a category path is consumed so the boundary is ready.
current_model_note = "incoming + category output boundaries documented; wired where the category path is consumed"

[ipv4_only]
allowed_ipv6_mentions = [
    "crates/emulebb-core/src/lib.rs",
    "crates/emulebb-core/src/kad_buddy.rs",
    "crates/emulebb-core/src/kad_hello.rs",
    "crates/emulebb-core/tests/kad_swarm_support/node.rs",
    "crates/emulebb-ed2k/src/ed2k_tcp/transport.rs",
    "crates/emulebb-ed2k/src/ed2k_tcp/buddy_link.rs",
    "crates/emulebb-ed2k/src/ed2k_tcp/listener/session.rs",
    "crates/emulebb-ed2k/src/stun.rs",
    "crates/emulebb-ed2k/src/nat/miniupnpc.rs",
    "crates/emulebb-kad-dht/src/publish.rs",
    "crates/emulebb-kad-dht/src/traversal.rs",
    "crates/emulebb-kad-net/src/obfuscation/inbound.rs",
    "crates/emulebb-kad-net/src/obfuscation/outbound.rs",
    "crates/emulebb-kad-net/src/obfuscation/tests.rs",
    "crates/emulebb-kad-net/src/rpc/tests/obfuscation.rs",
    "crates/emulebb-miniupnpc/src/lib.rs",
    "crates/emulebb-miniupnpc-sys/src/lib.rs",
]
