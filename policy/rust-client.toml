[[structure.large_file_allowlist]]
path = "crates/emulebb-kad-dht/src/traversal.rs"
hard_limit_lines = 1082
rationale = "frozen legacy Kad traversal implementation; split lookup state, query selection, and result merge as touched. Bumped (+15) for the Process_KADEMLIA2_RES per-contact parity drops in sanitize_res_contacts: contacts with version < KADEMLIA_VERSION2_47a (Kad1) and contacts on UDP port 53 with version <= KADEMLIA_VERSION5_48a (No DNS Port without encryption) are now dropped, matching KademliaUDPListener.cpp:830-857. Bumped again (+28, 997 -> 1025) for B10: a lightweight KadIpFilter hook (Option<Arc<dyn Fn(Ipv4Addr)->bool>>) on TraversalConfig threaded through LookupPhaseConfig into sanitize_res_contacts, which now drops per-RES contacts whose IP is filtered/banned (oracle KademliaUDPListener.cpp:830-857 theApp.ipfilter->IsFiltered), plus the new KadIpFilter type alias and the test_sanitize_res_contacts_drops_ip_filtered_contacts unit test; the live ed2k IpFilter is bridged into DhtNode (set_ip_filter) by core since the IpFilter lives in emulebb-ed2k which depends on this crate. Bumped again (+5, 1025 -> 1030) to thread the real eD2k TCP port from the RES ContactEntry through TraversalContact (new tcp_port field populated in insert_response_contact) so a lookup-learned routing contact (node/search.rs) keeps its advertised eD2k TCP port instead of falling back to the UDP port. Bumped again (+24, 1030 -> 1054) for the AddUnfiltered RES-contact sink (oracle KademliaUDPListener.cpp:849): a KadResContactSink hook (Option<Arc<dyn Fn(&ContactEntry)>>) on TraversalConfig threaded through LookupPhaseConfig into insert_response_contacts, which now offers every sanitized RES contact to the routing table as it arrives (not just the final closest-set), plus the type alias and the test_res_contacts_feed_the_addunfiltered_sink_as_they_arrive unit test; core bridges the live routing table behind it via a per-node ingestion channel + drain task. Bumped again (+13, 1054 -> 1067) for the search-phase budget fix: phase 2 now runs SEARCH_RES collection until the full traversal deadline (SEARCH lifetime, eMule parity) instead of capping the whole phase at the per-node query_timeout, which starved live keyword searches to 0 results; query_timeout now only bounds a single idle receive slice (comment + the reworked phase_deadline/receive_until logic). Bumped again (+15, 1067 -> 1082) for the search-phase SEND fix (live: phase 2 walked the closest nodes but transmitted ZERO KADEMLIA2_SEARCH_KEY_REQ 0x33): when phase 1 ate almost the whole shared SEARCH_TIMEOUT (slow rate-limited 0x21 walk), the lookup's last response was recent at phase-2 start but only a sliver of the deadline remained, so the unclamped 3s jump-start idle grace pushed the first emit to/past phase_deadline and the drain loop broke having sent nothing. compute_initial_jumpstart_emit_at now takes phase_deadline and clamps the first emit to phase_deadline - JUMPSTART_DEADLINE_MARGIN (50ms) so the closest responders are always queried with 0x33 while any budget remains (eMule CSearch::JumpStart/SendFindValue: the idle grace is a stall detector, never a first-packet suppressor)."

