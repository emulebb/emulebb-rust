rationale = "frozen legacy download session state machine; split startup, range handling, and completion paths as touched. Cap bumped for recording peer part-availability from the OP_FILESTATUS arms into the live download-source registry. Bumped again (+68) for the UDP source-reask detach hook: capture the peer eD2k udp_port/udp_version from OP_EMULEINFO, and on a queue-rank (OP_QUEUERANK/OP_QUEUERANKING) detach a UDP-eligible source onto the reask loop (try_detach_queued_source_for_reask) returning QueuedDetachedForUdpReask instead of holding the slot over TCP. Bumped again (+26) after local rust↔eMuleBB reask validation: capture the peer eD2k UDP port from the hello CT_EMULE_UDPPORTS (the canonical source; OP_EMULEINFO sends 0) in both hello handlers, guard the OP_EMULEINFO udp fields against clobbering with 0, and add reask detach-decision debug logging. Bumped again (+12): a peer that advertised a hello CT_EMULE_UDPPORTS port is UDP-capable, so when the download session never learned ET_UDPVER, default the peer udp_version to our advertised 4 for the eligibility gate (the outbound reask ping is framed by our own udp_version, so the wire format is unaffected). Bumped again (+14) for B2 secure-ident verification: the OP_SIGNATURE arm now RSA-verifies the uploader's signature (verify_peer_secure_ident_signature) and records verified/unverified in the packet dump instead of blindly setting peer_signature_received. Bumped again (+18) for the AICH/ICH recovery serve: the OP_AICHREQUEST arm now answers a peer with real recovery data (transfer_runtime.create_aich_recovery_data builds the part's CAICHHashTree recovery path from our verified shared payload) and falls back to the failure answer only when we cannot serve, replacing the prior always-failure stub; the tree algorithm lives in the new ed2k_transfer/aich_tree.rs + aich_recovery.rs modules within budget. Bumped again (+9) to wire OP_AICHANSWER -> ICH block-level salvage: the answer arm now slices the recovery body and calls the shared handle_aich_recovery_answer (ed2k_tcp/aich_salvage.rs) which drives Ed2kTransferRuntime::begin_part_salvage (keep the good 180KB blocks of a corrupt part, mark only the bad blocks for re-download by the gap-aware window, MD4 re-verify once all blocks present), replacing the prior decode-and-log stub; the salvage flow + per-part block bitmap live in the new ed2k_transfer/salvage.rs + block_bitmap.rs modules within budget. Bumped again (+37) to close the AICH/ICH recovery *request* loop (the previously dead-ended salvage path): the download flush now surfaces an MD4 verification failure (PieceWriteOutcome::VerificationFailed) which the loop drains each iteration via pump_aich_recovery_requests to emit OP_AICHREQUEST to a peer that supports AICH and holds the corrupt part when a trusted AICH root is known (master CPartFile::HashSinglePart failure -> RequestAICHRecovery); the OP_AICHANSWER arm clears the in-flight request marker so the part can be re-requested if salvage still fails. The request-emission driver body lives in the new ed2k_tcp/download/aich_request.rs module within the 600-line budget; session.rs carries only the per-part bitmap gating wiring, the recovery-queue state fields, the pump call site, and the inflight-clear arm. Also threads the connected peer's OP_FILESTATUS part bitmap (peer_part_bitmap) into the download window so part picking is gated on peer availability and ranked rarest-first (master sender->IsPartAvailable + GetNextRequestedBlock)."

