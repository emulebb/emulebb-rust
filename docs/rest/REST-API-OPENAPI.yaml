      type: object
      unevaluatedProperties: false
      required: [id, query, method, type, status, items]
      properties:
        id:
          type: string
        query:
          type: string
        method:
          type: string
          description: Resolved native search method.
          enum: [automatic, server, global, kad]
        type:
          type: string
          enum: ["", arc, audio, iso, image, pro, video, doc, emulecollection]
        status:
          type: string
          enum: [running, stopped, complete, error]
        items:
          type: array
          description: >
            Current native visible result snapshot for this page, bounded by the
            `offset` and `limit` query parameters. The search resource shares the
            common pagination fields (`total`/`offset`/`limit`); controllers
            should poll the resource and preserve eMule's stock eD2K/Kad search
            semantics.
          items:
            $ref: "#/components/schemas/SearchResult"
      allOf:
        - $ref: "#/components/schemas/Pagination"
