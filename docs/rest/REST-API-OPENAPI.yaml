  schemas:
    EnvelopeMeta:
      type: object
      additionalProperties: false
      required: [apiVersion]
      properties:
        apiVersion:
          type: string
        generatedAt:
          type: string
          format: date-time
    Ok:
      type: object
      additionalProperties: false
      required: [ok]
      properties:
        ok:
          type: boolean
          const: true
    OkEnvelope:
      type: object
      additionalProperties: false
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/Ok"
        meta:
          $ref: "#/components/schemas/EnvelopeMeta"
    PeerBanEnvelope:
      unevaluatedProperties: false
      allOf:
        - $ref: "#/components/schemas/EnvelopeBase"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/PeerBanResult"
    PeerBanResult:
      type: object
      additionalProperties: false
      required: [ok, banned]
      properties:
        ok:
          type: boolean
          const: true
        banned:
          type: boolean
    DiagnosticDumpEnvelope:
      unevaluatedProperties: false
      allOf:
        - $ref: "#/components/schemas/EnvelopeBase"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/DiagnosticDump"
    DiagnosticDump:
      type: object
      additionalProperties: false
      required: [ok, path, fullMemory]
      properties:
        ok:
          type: boolean
          const: true
        path:
          type: string
        fullMemory:
          type: boolean
    ErrorEnvelope:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          type: object
          additionalProperties: false
          required: [code, message, details]
          properties:
            code:
              type: string
              description: Stable machine-readable native REST error code.
              enum:
                - INVALID_ARGUMENT
                - UNAUTHORIZED
                - METHOD_NOT_ALLOWED
                - NOT_FOUND
                - INVALID_STATE
                - SERVICE_BUSY
                - EMULE_UNAVAILABLE
                - EMULE_ERROR
            message:
              type: string
              description: Human-readable error summary.
            details:
              type: object
              description: >-
                Bounded structured diagnostic fields, empty when no details are
                available. For INVALID_ARGUMENT failures on a bounded scalar
                parameter (such as an out-of-range limit or offset), details
                carries the offending "field" name and a "constraint" string of
                the form "min..max" (for example {"field": "limit", "constraint":
                "1..1000"}).
              additionalProperties: true
              properties:
                field:
                  type: string
                  description: Name of the request parameter that failed validation.
                constraint:
                  type: string
                  description: Inclusive numeric bounds the field must satisfy, formatted as "min..max".
    AppEnvelope:
      unevaluatedProperties: false
      allOf:
        - $ref: "#/components/schemas/EnvelopeBase"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/App"
    CapabilityDiscoveryEnvelope:
      unevaluatedProperties: false
      allOf:
        - $ref: "#/components/schemas/EnvelopeBase"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/CapabilityDiscovery"
    EnvelopeBase:
      type: object
      additionalProperties: false
      required: [data, meta]
      properties:
        data: {}
        meta:
          $ref: "#/components/schemas/EnvelopeMeta"
    Pagination:
      type: object
      description: >
        Shared pagination metadata for every paged response (`items` plus
        these fields). `total` is the full count across all pages, bounded by
        the same `offset`/`limit` query parameters that produced the page.
      required: [total, offset, limit]
      properties:
        total:
          type: integer
          minimum: 0
        offset:
          type: integer
          minimum: 0
        limit:
          type: integer
          minimum: 1
          maximum: 1000
    App:
      type: object
      additionalProperties: false
      required: [name, version, apiVersion, lifecycle, capabilities]
      properties:
        name:
          type: string
        version:
          type: string
        apiVersion:
          type: string
        build:
          type: string
        platform:
          type: string
        lifecycle:
          $ref: "#/components/schemas/AppLifecycle"
        elevated:
          type: boolean
        webServer:
          type: object
          additionalProperties: false
          properties:
            https:
              type: boolean
            allowedIps:
              type: array
              items:
                type: string
        capabilities:
          type: object
          additionalProperties:
            type: boolean
    CapabilityDiscovery:
      type: object
      additionalProperties: false
      required: [contractVersion, apiVersion, capabilities]
      properties:
        contractVersion:
          type: string
          description: Independent `/api/v1` contract version from `info.x-contract-version`.
          example: "1.0.0"
        apiVersion:
          type: string
          example: "1"
        capabilities:
          type: array
          items:
            type: string
    AppLifecycle:
      type: object
      additionalProperties: false
      required: [state, startupComplete, coreReady, sharedFilesReady, acceptingRest, acceptingMutations, shutdownInProgress]
      properties:
        state:
          type: string
          enum: [starting, running, shuttingdown, done]
        startupComplete:
          type: boolean
        coreReady:
          type: boolean
        sharedFilesReady:
          type: boolean
        acceptingRest:
          type: boolean
        acceptingMutations:
          type: boolean
        shutdownInProgress:
          type: boolean
    PreferencesEnvelope:
      unevaluatedProperties: false
      allOf:
        - $ref: "#/components/schemas/EnvelopeBase"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/Preferences"
    Preferences:
      type: object
      additionalProperties: false
      properties:
        downloadLimitKiBps:
          type: integer
          minimum: 1
          maximum: 4294967294
        uploadLimitKiBps:
          type: integer
          minimum: 1
          maximum: 4294967294
        maxSourcesPerFile:
          type: integer
          minimum: 1
          maximum: 2147483647
        maxConnections:
          type: integer
          minimum: 1
          maximum: 2147483647
        maxConnectionsPerFiveSeconds:
          type: integer
          minimum: 1
          maximum: 2147483647
        uploadClientDataRate:
          type: integer
          minimum: 1
          maximum: 4294967295
        maxUploadSlots:
          type: integer
          minimum: 1
          maximum: 64
        uploadSlotElasticPercent:
          type: integer
          minimum: 0
          maximum: 100
        queueSize:
          type: integer
          minimum: 2000
          maximum: 10000
        autoConnect:
          type: boolean
        newAutoUp:
          type: boolean
        newAutoDown:
          type: boolean
        creditSystem:
          type: boolean
        safeServerConnect:
          type: boolean
        addServersFromServer:
          type: boolean
          description: Add servers advertised by a connected server (OP_SERVERLIST); eMule GetAddServersFromServer, default true.
        networkKademlia:
          type: boolean
        networkEd2k:
          type: boolean
        downloadAutoBroadbandIo:
          type: boolean
          description: Enables adaptive broadband download write buffering based on currently available RAM.
    PreferencesPatch:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        downloadLimitKiBps:
          type: integer
          minimum: 1
          maximum: 4294967294
        uploadLimitKiBps:
          type: integer
          minimum: 1
          maximum: 4294967294
        maxSourcesPerFile:
          type: integer
          minimum: 1
          maximum: 2147483647
        maxConnections:
          type: integer
          minimum: 1
          maximum: 2147483647
        maxConnectionsPerFiveSeconds:
          type: integer
          minimum: 1
          maximum: 2147483647
        uploadClientDataRate:
          type: integer
          minimum: 1
          maximum: 4294967295
        maxUploadSlots:
          type: integer
          minimum: 1
          maximum: 64
        uploadSlotElasticPercent:
          type: integer
          minimum: 0
          maximum: 100
        queueSize:
          type: integer
          minimum: 2000
          maximum: 10000
        autoConnect:
          type: boolean
        newAutoUp:
          type: boolean
        newAutoDown:
          type: boolean
        creditSystem:
          type: boolean
        safeServerConnect:
          type: boolean
        addServersFromServer:
          type: boolean
          description: Add servers advertised by a connected server (OP_SERVERLIST); eMule GetAddServersFromServer, default true.
        networkKademlia:
          type: boolean
        networkEd2k:
          type: boolean
        downloadAutoBroadbandIo:
          type: boolean
          description: Enables adaptive broadband download write buffering based on currently available RAM.
    StatusEnvelope:
