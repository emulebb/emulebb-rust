components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
  parameters:
    CategoryId:
      name: categoryId
      in: path
      required: true
      schema:
        type: integer
        minimum: 0
        maximum: 4294967295
    Confirm:
      name: confirm
      in: query
      required: true
      schema:
        type: boolean
        enum: [true]
      description: Required explicit confirmation for destructive body-free DELETE routes.
    ClientId:
      name: clientId
      in: path
      required: true
      schema:
        type: string
        pattern: "^([0-9a-f]{32}|[^/]+:(6553[0-5]|655[0-2][0-9]|65[0-4][0-9]{2}|6[0-4][0-9]{3}|[1-5][0-9]{4}|[1-9][0-9]{0,3}))$"
      description: Stable client selector returned by upload or queue rows, either a lowercase MD4 hash or an endpoint token parsed at the final `address:port` colon.
    FileHash:
      name: hash
      in: path
      required: true
      schema:
        type: string
        pattern: "^[0-9a-f]{32}$"
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 1000
        default: 100
    Offset:
      name: offset
      in: query
      schema:
        type: integer
        minimum: 0
        maximum: 2147483647
        default: 0
    IncludeScoreBreakdown:
      name: includeScoreBreakdown
      in: query
      schema:
        type: boolean
        default: false
      description: Include per-client upload score diagnostics such as cooldown availability and cooldown remaining time.
    IncludeEvidence:
      name: includeEvidence
      in: query
      schema:
        type: boolean
        default: true
      description: Include the grouped SearchResult.evidence block on each result. Set false to omit the heavy evidence payload when only basic result metadata is needed.
    ExactTotal:
      name: exactTotal
      in: query
      schema:
        type: boolean
        default: true
      description: Return an exact result total. Set false to allow an estimated total when computing the exact count is expensive.
    SearchId:
      name: searchId
      in: path
      required: true
      schema:
        type: integer
        minimum: 0
        maximum: 4294967295
    ServerId:
      name: serverId
      in: path
      required: true
      schema:
        type: string
        pattern: "^[^/]+:(6553[0-5]|655[0-2][0-9]|65[0-4][0-9]{2}|6[0-4][0-9]{3}|[1-5][0-9]{4}|[1-9][0-9]{0,3})$"
      description: URL-encoded endpoint token parsed at the final `address:port` colon.
    UserHash:
      name: userHash
      in: path
      required: true
      schema:
        type: string
        pattern: "^[0-9a-f]{32}$"
  responses:
    AppResponse:
      description: Application envelope.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AppEnvelope"
    BulkOperationResponse:
      description: Bulk operation envelope.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/BulkOperationEnvelope"
    CapabilityDiscoveryResponse:
      description: Capability discovery envelope.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/CapabilityDiscoveryEnvelope"
    CategoryListResponse:
      description: Category collection envelope.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/CategoryListEnvelope"
    CategoryResponse:
      description: Category envelope.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/CategoryEnvelope"
    CommentListResponse:
      description: Comment collection envelope.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/CommentListEnvelope"
    Ed2kLinkResponse:
      description: ED2K link envelope.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Ed2kLinkEnvelope"
    ErrorResponse:
      description: Error envelope.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    MethodNotAllowedResponse:
      description: Error envelope for an unsupported HTTP method on a known route.
      headers:
        Allow:
          description: Comma-separated list of HTTP methods supported by this route.
          required: true
          schema:
            type: string
          example: "GET, POST"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    DiagnosticDumpResponse:
      description: Diagnostic dump envelope.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DiagnosticDumpEnvelope"
    FriendListResponse:
      description: Friend collection envelope.
