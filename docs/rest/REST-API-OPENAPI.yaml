openapi: 3.1.0
info:
  title: eMuleBB REST API (canonical superset, emulebb-rust)
  version: 1.1.0
  x-contract-version: "1.1.0"
  x-contract-baseline: "eMuleBB 0.7.3 contract"
  summary: The one capability-gated /api/v1 contract; emulebb-rust owns the superset.
  description: >
    Source-of-truth for the single capability-gated `/api/v1` contract. There is
    one contract; implementations differ by the capabilities they advertise, not
    by a separate spec. emulebb-rust is the superset (it leads the contract
    version and adds indexing/Arr capabilities); the frozen eMuleBB MFC client is
    a subset advertising fewer capabilities. It is baselined on the eMuleBB
    `0.7.3` contract and evolves on its own independent **contract version** line
    (`x-contract-version`, semver), decoupled from any product release tag.
    Controllers (TrackMuleBB) read `GET /api/v1/capabilities`, target a contract
    version range, and call only advertised operations.
    Versioning policy: additive endpoints/fields bump the minor; breaking changes
    bump the major with a documented migration. Capability model:
    `emulebb-tooling/docs/active/API-V1-COMPATIBILITY.md`.
    The API uses `X-API-Key` authentication only; adapter compatibility
    (`/api/v2` qBit-compat, Torznab) must not weaken the native route shape.
servers:
  - url: http://{host}:{port}/api/v1
    variables:
      host:
        default: 127.0.0.1
      port:
        default: "4711"
  - url: https://{host}:{port}/api/v1
    variables:
      host:
        default: 127.0.0.1
      port:
        default: "4711"
security:
  - ApiKeyAuth: []
tags:
  - name: App
  - name: Diagnostics
  - name: Stats
  - name: Categories
  - name: Transfers
  - name: SharedFiles
  - name: SharedDirectories
  - name: Uploads
  - name: Servers
  - name: Kad
  - name: Searches
  - name: Friends
  - name: Logs
