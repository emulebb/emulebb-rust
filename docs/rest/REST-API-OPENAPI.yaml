    UploadRemoveResponse:
      description: Upload removal operation envelope.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/UploadRemoveEnvelope"
    UploadQueueListResponse:
      description: Upload-queue collection envelope.
      content:
        application/json:
          schema:
