# cargo-deny configuration for emulebb-rust.
#
# Rollout is incremental: security advisories are the hard CI gate from day one
# (`cargo deny check advisories` in .github/workflows/ci.yml). The bans, sources,
# and licenses sections below are configured but NOT yet enforced in CI; enable
# `check bans sources licenses` after a dependency + license audit so the first
# enforcement does not block on pre-existing dependency facts.

[advisories]
# Deny known vulnerabilities and yanked crates; flag all unmaintained advisories.
# (cargo-deny's `unmaintained` takes all/workspace/transitive/none, not a severity.)
yanked = "deny"
unmaintained = "all"
ignore = [
    # RUSTSEC-2023-0071 — "Marvin Attack" RSA timing side-channel in the `rsa`
    # crate. Pulled in transitively; upstream has no fixed release yet, so it
    # cannot be resolved by a version bump. The attack requires precise local
    # timing measurements against an attacker-chosen ciphertext oracle, which our
    # usage does not expose. Revisit and drop this ignore once `rsa` ships a fix.
    "RUSTSEC-2023-0071",
]

[bans]
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "warn"
unknown-git = "warn"

[licenses]
# Permissive + GPL-compatible allow-list (emulebb-rust is GPL-2.0-only). Tighten and
# complete this list during the license audit before enforcing in CI.
confidence-threshold = 0.8
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "MPL-2.0",
  "Unicode-DFS-2016",
  "Unicode-3.0",
  "CC0-1.0",
  "GPL-2.0-only",
  "GPL-2.0",
  "GPL-3.0",
]
