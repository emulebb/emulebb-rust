# cargo-deny configuration for emulebb-rust.
#
# Advisories, licenses, and sources are hard CI gates. Bans remain advisory
# while duplicate-version cleanup is handled incrementally.

[advisories]
# Deny known vulnerabilities and yanked crates; flag all unmaintained advisories.
# (cargo-deny's `unmaintained` takes all/workspace/transitive/none, not a severity.)
yanked = "deny"
unmaintained = "all"
ignore = [
    # RUSTSEC-2023-0071 — "Marvin Attack" RSA timing side-channel in the `rsa`
    # crate. Pulled in transitively; upstream has no fixed release yet, so it
    # cannot be resolved by a version bump. The attack requires precise local
    # timing measurements against an attacker-chosen ciphertext oracle, which our
    # usage does not expose. Revisit and drop this ignore once `rsa` ships a fix.
    "RUSTSEC-2023-0071",
    # RUSTSEC-2024-0436 — `paste` is unmaintained. It is transitive through the
    # latest Slint/image graph and is not used by emulebb-rust code directly.
    # No safe upgrade is available; remove when Slint/image no longer resolves it.
    "RUSTSEC-2024-0436",
    # RUSTSEC-2026-0192 — `ttf-parser` is unmaintained. The latest Slint release
    # still resolves it through its font/rendering stack, with no safe upgrade.
    "RUSTSEC-2026-0192",
    # RUSTSEC-2026-0194/0195 affect quick-xml 0.39 while parsing attacker-controlled
    # XML. Our only path is the latest wayland-scanner, which uses it at build time
    # on trusted Wayland protocol files and currently requires quick-xml ^0.39.
    # Remove both as soon as wayland-scanner accepts quick-xml >=0.41.
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
]

[bans]
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"

[licenses]
# GPL-2.0-compatible and other approved dependency licenses. Slint is selected
# under its royalty-free application license (not GPL-3.0-only); its attribution
# requirements are recorded in THIRD-PARTY-LICENSES.md.
confidence-threshold = 0.8
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "CDLA-Permissive-2.0",
  "ISC",
  "Zlib",
  "Unicode-3.0",
  "CC0-1.0",
  "GPL-2.0-only",
  "LicenseRef-Slint-Royalty-free-2.0",
  "NCSA",
  "Unlicense",
]
